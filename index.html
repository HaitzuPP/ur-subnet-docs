<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>UR Subnet — Documentation</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
<style>
:root{
  --clr-pos:#1a7a3a; --clr-pos-sub:#52a870; --clr-pos-bg:#e8f5ee;
  --clr-neg:#c0392b; --clr-neg-bg:#fdecea; --clr-warn:#e67e22; --clr-blue:#2471a3;
  --text-primary:#111; --text-body:#333; --text-mid:#555; --text-sub:#777;
  --text-muted:#999; --text-faint:#bbb; --text-ghost:#ccc;
  --border-strong:#ddd; --border-mid:#ebebeb; --border-faint:#f0f0f0; --border-row:#f5f5f5;
  --surface-alt:#f9fafb; --surface-hover:#fafafa;
  --radius-card:6px; --radius-badge:4px;
  --sans:Arial,"Helvetica Neue",Helvetica,"Segoe UI",sans-serif;
  --mono:"SFMono-Regular",Menlo,Consolas,"Liberation Mono",monospace;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:var(--sans);color:var(--text-body);background:#fff;
  font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased}
.topbar{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:14px;
  height:54px;padding:0 24px;background:#fff;border-bottom:1px solid var(--border-strong)}
.brand{font-weight:700;color:var(--text-primary);font-size:15px;letter-spacing:.02em}
.brand .mark{display:inline-block;width:10px;height:10px;background:var(--clr-pos);
  margin-right:9px;vertical-align:middle;border-radius:2px}
.brand .sub{color:var(--text-muted);font-weight:400;margin-left:8px;font-size:12px;
  text-transform:uppercase;letter-spacing:.08em}
.topbar .spacer{flex:1}
#search{font-family:var(--sans);font-size:13px;padding:6px 10px;width:230px;
  border:1px solid var(--border-strong);border-radius:var(--radius-badge);color:var(--text-body);outline:none}
#search:focus{border-color:var(--text-muted)}
.menu-btn{display:none;background:none;border:1px solid var(--border-strong);
  border-radius:var(--radius-badge);font-size:18px;line-height:1;padding:5px 9px;cursor:pointer;color:var(--text-mid)}
.wrap{display:flex;align-items:flex-start}
.sidebar{position:sticky;top:54px;height:calc(100vh - 54px);overflow-y:auto;
  width:262px;flex:0 0 262px;border-right:1px solid var(--border-mid);padding:20px 0 60px;background:#fff}
.main{flex:1;min-width:0;max-width:880px;margin:0 auto;padding:34px 48px 120px}
.nav-sec{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;
  color:var(--text-muted);padding:0 22px 8px}
.doc-link{display:block;padding:9px 22px;cursor:pointer;border-left:2px solid transparent}
.doc-link:hover{background:var(--surface-hover)}
.doc-link.active{border-left-color:var(--clr-pos);background:var(--surface-alt)}
.doc-link .t{font-size:13px;font-weight:600;color:var(--text-primary)}
.doc-link .s{font-size:11px;color:var(--text-muted);margin-top:1px}
.toc{margin:6px 0 18px;padding:0 0 12px;border-bottom:1px solid var(--border-faint)}
.toc a{display:block;font-size:12px;color:var(--text-mid);text-decoration:none;
  padding:3px 22px 3px 30px;border-left:2px solid transparent;line-height:1.4}
.toc a.lvl3{padding-left:42px;font-size:11px;color:var(--text-sub)}
.toc a:hover{color:var(--text-primary)}
.toc a.active{color:var(--clr-pos);border-left-color:var(--clr-pos);font-weight:600}
.doc{display:none;counter-reset:fig}.doc.active{display:block}
.md h1,.md h2,.md h3{scroll-margin-top:66px}
.doc-link:focus-visible,.toc a:focus-visible,#search:focus-visible,.menu-btn:focus-visible,.tbtn:focus-visible{outline:2px solid var(--clr-blue);outline-offset:2px}
.doc-head{border-bottom:1px solid var(--border-strong);padding-bottom:14px;margin-bottom:8px}
.doc-head .kicker{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--clr-pos)}
.doc-head h1{margin:6px 0 2px;font-size:26px}
.doc-head .lede{color:var(--text-muted);font-size:13px}
.md h1{font-size:24px;color:var(--text-primary);margin:34px 0 12px;padding-bottom:8px;
  border-bottom:1px solid var(--border-mid);line-height:1.25}
.md h2{font-size:19px;color:var(--text-primary);margin:30px 0 10px;line-height:1.3}
.md h3{font-size:15.5px;color:var(--text-primary);margin:22px 0 8px}
.md h4{font-size:13.5px;color:var(--text-mid);margin:18px 0 6px;text-transform:uppercase;letter-spacing:.04em}
.md p{margin:10px 0;color:var(--text-body)}
.md a{color:var(--clr-blue);text-decoration:none;border-bottom:1px solid #cfe0ea}
.md a:hover{border-bottom-color:var(--clr-blue)}
.md strong{color:var(--text-primary);font-weight:700}
.md ul,.md ol{margin:10px 0;padding-left:24px}
.md li{margin:5px 0}
.md hr{border:0;border-top:1px solid var(--border-mid);margin:28px 0}
.md blockquote{margin:14px 0;padding:10px 16px;background:var(--surface-alt);
  border-left:3px solid var(--clr-warn);color:var(--text-mid);font-size:14px;border-radius:0 var(--radius-badge) var(--radius-badge) 0}
.md blockquote p{margin:4px 0}
.md code{font-family:var(--mono);font-size:12.5px;background:var(--border-row);padding:1.5px 5px;border-radius:3px;color:var(--clr-neg)}
.md pre{background:#fafbfc;border:1px solid var(--border-mid);border-radius:var(--radius-card);
  padding:14px 16px;overflow-x:auto;margin:14px 0;line-height:1.5}
.md pre code{background:none;padding:0;color:var(--text-body);font-size:12.5px;white-space:pre}
.md table{border-collapse:collapse;width:100%;margin:16px 0;font-size:13px;display:block;overflow-x:auto}
.md th{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted);
  text-align:left;padding:8px 12px;border-bottom:1px solid var(--border-strong);white-space:nowrap}
.md td{padding:8px 12px;border-bottom:1px solid var(--border-row);color:var(--text-body);vertical-align:top}
.md tbody tr:hover{background:var(--surface-hover)}
.md td code{font-size:11.5px}
/* figures */
.figure{border:1px solid var(--border-mid);border-radius:var(--radius-card);background:#fff;margin:18px 0 22px;overflow-x:auto;counter-increment:fig}
.figure svg{display:block;width:100%;min-width:580px;height:auto;padding:6px 6px 0}
.figure figcaption{font-size:11px;color:var(--text-sub);padding:9px 14px;border-top:1px solid var(--border-faint);background:var(--surface-alt);position:sticky;left:0}
.figure figcaption::before{content:"FIG " counter(fig) " · ";font-weight:700;color:var(--clr-pos);letter-spacing:.04em}
body.nofigs .figure{display:none}
.tbtn{background:none;border:1px solid var(--border-strong);border-radius:var(--radius-badge);font-size:12px;padding:6px 10px;cursor:pointer;color:var(--text-mid)}
.tbtn:hover{background:var(--surface-hover)}
.tbtn.on{color:var(--clr-pos);border-color:var(--clr-pos)}
a.tbtn{text-decoration:none;display:inline-flex;align-items:center}
.tbtn.cta{color:#fff;background:var(--clr-pos);border-color:var(--clr-pos);font-weight:700}
.tbtn.cta:hover{background:#15602e}
/* comparison callouts */
.callout{border:1px solid var(--border-mid);border-left-width:4px;border-radius:var(--radius-card);background:var(--surface-alt);margin:16px 0;padding:11px 16px}
.callout.v-support{border-left-color:var(--clr-pos)}
.callout.v-concern{border-left-color:var(--clr-neg)}
.callout.v-mixed{border-left-color:var(--clr-warn)}
.co-head{display:flex;align-items:center;gap:8px;margin-bottom:5px;flex-wrap:wrap}
.co-tag{font-size:9.5px;font-weight:700;letter-spacing:.08em;color:var(--text-muted);text-transform:uppercase}
.co-sub{font-size:12.5px;font-weight:700;color:var(--text-primary)}
.co-chip{margin-left:auto;font-size:9.5px;font-weight:700;padding:2px 7px;border-radius:var(--radius-badge);text-transform:uppercase;letter-spacing:.04em}
.v-support .co-chip{background:var(--clr-pos-bg);color:var(--clr-pos)}
.v-concern .co-chip{background:var(--clr-neg-bg);color:var(--clr-neg)}
.v-mixed .co-chip{background:#fff3e6;color:var(--clr-warn)}
.co-body{font-size:13px;color:var(--text-body);line-height:1.55}
.co-body a{color:var(--clr-blue);text-decoration:none;border-bottom:1px solid #cfe0ea}
.co-body a:hover{border-bottom-color:var(--clr-blue)}
body.nonotes .callout{display:none}
/* plain-english explainers */
.explain{border:1px solid #d6e6f2;border-left:4px solid var(--clr-blue);border-radius:var(--radius-card);background:#f5f9fc;margin:16px 0;padding:11px 16px}
.ex-head{display:flex;align-items:center;gap:8px;margin-bottom:5px;flex-wrap:wrap}
.ex-tag{font-size:9.5px;font-weight:700;letter-spacing:.08em;color:var(--clr-blue);text-transform:uppercase}
.ex-title{font-size:13px;font-weight:700;color:var(--text-primary)}
.ex-body{font-size:13px;color:var(--text-body);line-height:1.55}
.ex-body p{margin:6px 0}.ex-body ul{margin:6px 0;padding-left:20px}.ex-body li{margin:4px 0}
.ex-body strong{color:var(--text-primary)}
.ex-body code{font-family:var(--mono);font-size:11.5px;background:#e7f0f7;padding:1px 4px;border-radius:3px;color:var(--clr-blue)}
.explain.inv .ex-tag{background:var(--clr-blue);color:#fff;padding:2px 7px;border-radius:var(--radius-badge);font-size:9px}
.ex-body table.cmp{border-collapse:collapse;width:100%;margin:8px 0;font-size:12px;display:block;overflow-x:auto}
.ex-body table.cmp th{text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--text-muted);padding:8px 11px;border-bottom:1px solid var(--border-strong);vertical-align:bottom}
.ex-body table.cmp td{padding:8px 11px;border-bottom:1px solid var(--border-row);vertical-align:top;color:var(--text-body);line-height:1.45;min-width:170px}
.ex-body table.cmp td:first-child{font-weight:700;color:var(--text-primary);white-space:nowrap;min-width:auto}
.ex-body table.cmp tbody tr:hover{background:var(--surface-hover)}
.ex-body svg{display:block;width:100%;height:auto;margin:4px 0}
body.noexpl .explain{display:none}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:5px}
::-webkit-scrollbar-thumb:hover{background:var(--text-faint)}
.scrim{display:none}
@media(max-width:1080px){
  .menu-btn{display:block}#search{width:160px}
  .sidebar{position:fixed;top:54px;left:0;z-index:40;transform:translateX(-100%);transition:transform .2s ease;box-shadow:2px 0 12px rgba(0,0,0,.06)}
  .sidebar.open{transform:translateX(0)}
  .scrim.show{display:block;position:fixed;inset:54px 0 0 0;background:rgba(0,0,0,.25);z-index:35}
  .main{padding:24px 20px 100px}
}
@media(max-width:560px){.brand .sub{display:none}#search{width:120px}.tbtn span{display:none}}
@media print{
  .topbar,.sidebar,.scrim{display:none!important}
  .doc{display:block!important}.main{max-width:none;padding:0}
  .figure,.md pre,.md table{break-inside:avoid;page-break-inside:avoid}
  .doc-head{break-before:page}.doc:first-child .doc-head{break-before:auto}
}
</style>
</head>

<script id="docdata" type="application/json">[{"id": "readme", "title": "README", "sub": "Network overview", "md": "# sn\nBitTensor Subnet\n\n\n\n# Mining Pool 0 / Validator Pool 0\n\nThe core network.\n\nThe block size is 7 days.\n\n\n## Register a network operator\n\nGo to https://ur.xyz/networkoperator to register a new network operator key. You will use this key to communicate with the api.\n\n## Register a provider (ingress or egress)\n\nFollow the provider documentation at https://ur.xyz/provider . Providers work with the network operators. We suggest using the default list of network operators in the code to start. You can provide on more network operators by passing the `-no <domain>` arg multiple times to the provider or `-nofile <path` to have a file with one network operator domain per line.\n\nProviders register a client_id with the subnet that is used for root contracts. This allows them to independently audit their contracts.\n\n\n## Register a validator\n\nNetwork operators are required to have all their data sent to the subnet 4 hours after the block closes. Typically the network operator will continually send chunks of data throughout the block. The validators are required to have their final submission 24 hours after the block closes.\n\nValidators must stake X SN token to participate. Follow the validator documentation at https://ur.xyz/validator .\n\n\n# Mining Pool 1 / Validator Pool 1\n\nThe VPN factory. See https://vpn.dev\n\n", "viz": [{"match": "sn", "cap": "UR subnet at a glance \u2014 pools, block size, and who registers", "svg": "<svg viewBox=\"0 0 720 200\" xmlns=\"http://www.w3.org/2000/svg\" style=\"font-family:var(--sans)\"><defs><marker id=\"ah\" markerWidth=\"9\" markerHeight=\"9\" refX=\"6.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7,3 L0,6 Z\" fill=\"#999\"/></marker><marker id=\"ahg\" markerWidth=\"9\" markerHeight=\"9\" refX=\"6.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7,3 L0,6 Z\" fill=\"#1a7a3a\"/></marker><marker id=\"ahr\" markerWidth=\"9\" markerHeight=\"9\" refX=\"6.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7,3 L0,6 Z\" fill=\"#c0392b\"/></marker><marker id=\"ahb\" markerWidth=\"9\" markerHeight=\"9\" refX=\"6.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7,3 L0,6 Z\" fill=\"#2471a3\"/></marker><marker id=\"ahw\" markerWidth=\"9\" markerHeight=\"9\" refX=\"6.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7,3 L0,6 Z\" fill=\"#e67e22\"/></marker></defs><rect x=\"250\" y=\"24\" width=\"220\" height=\"40\" rx=\"8\" fill=\"#f9fafb\" stroke=\"#111\" stroke-width=\"1\" /><text x=\"360\" y=\"49\" font-size=\"12.0\" fill=\"#111\" font-weight=\"700\" text-anchor=\"middle\">UR Bittensor subnet</text><rect x=\"110\" y=\"100\" width=\"200\" height=\"46\" rx=\"5\" fill=\"#e8f5ee\" stroke=\"#1a7a3a\" stroke-width=\"1\" /><rect x=\"110\" y=\"100\" width=\"4.5\" height=\"46\" rx=\"2\" fill=\"#1a7a3a\"/><text x=\"210.0\" y=\"120.0\" font-size=\"12.5\" fill=\"#1a7a3a\" font-weight=\"700\" text-anchor=\"middle\">Mining/Validator Pool 0</text><text x=\"210.0\" y=\"135.0\" font-size=\"10.0\" fill=\"#777\" font-weight=\"400\" text-anchor=\"middle\">the core network</text><rect x=\"410\" y=\"100\" width=\"200\" height=\"46\" rx=\"5\" fill=\"#f9fafb\" stroke=\"#ddd\" stroke-width=\"1\" /><rect x=\"410\" y=\"100\" width=\"4.5\" height=\"46\" rx=\"2\" fill=\"#999\"/><text x=\"510.0\" y=\"120.0\" font-size=\"12.5\" fill=\"#555\" font-weight=\"700\" text-anchor=\"middle\">Mining/Validator Pool 1</text><text x=\"510.0\" y=\"135.0\" font-size=\"10.0\" fill=\"#777\" font-weight=\"400\" text-anchor=\"middle\">the VPN factory \u00b7 vpn.dev</text><line x1=\"320\" y1=\"64\" x2=\"210\" y2=\"100\" stroke=\"#1a7a3a\" stroke-width=\"1.5\" marker-end=\"url(#ahg)\"/><line x1=\"400\" y1=\"64\" x2=\"510\" y2=\"100\" stroke=\"#999\" stroke-width=\"1.5\" marker-end=\"url(#ah)\"/><rect x=\"40\" y=\"160\" width=\"640\" height=\"28\" rx=\"4\" fill=\"#e8f5ee\" stroke=\"#1a7a3a\" stroke-width=\"1\" /><text x=\"360\" y=\"178\" font-size=\"10.0\" fill=\"#1a7a3a\" font-weight=\"700\" text-anchor=\"middle\">Block size = 7 days \u2014 the unit the contract accrues and settles over</text></svg>"}, {"match": "Mining Pool 0", "cap": "Pool 0 submission deadlines after a block closes", "svg": "<svg viewBox=\"0 0 720 150\" xmlns=\"http://www.w3.org/2000/svg\" style=\"font-family:var(--sans)\"><defs><marker id=\"ah\" markerWidth=\"9\" markerHeight=\"9\" refX=\"6.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7,3 L0,6 Z\" fill=\"#999\"/></marker><marker id=\"ahg\" markerWidth=\"9\" markerHeight=\"9\" refX=\"6.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7,3 L0,6 Z\" fill=\"#1a7a3a\"/></marker><marker id=\"ahr\" markerWidth=\"9\" markerHeight=\"9\" refX=\"6.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7,3 L0,6 Z\" fill=\"#c0392b\"/></marker><marker id=\"ahb\" markerWidth=\"9\" markerHeight=\"9\" refX=\"6.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7,3 L0,6 Z\" fill=\"#2471a3\"/></marker><marker id=\"ahw\" markerWidth=\"9\" markerHeight=\"9\" refX=\"6.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7,3 L0,6 Z\" fill=\"#e67e22\"/></marker></defs><line x1=\"60\" y1=\"70\" x2=\"660\" y2=\"70\" stroke=\"#ddd\" stroke-width=\"1.4\"/><line x1=\"60\" y1=\"62\" x2=\"60\" y2=\"78\" stroke=\"#111\" stroke-width=\"1.4\"/><text x=\"60\" y=\"96\" font-size=\"9.5\" fill=\"#111\" font-weight=\"700\" text-anchor=\"middle\">block closes</text><line x1=\"360\" y1=\"62\" x2=\"360\" y2=\"78\" stroke=\"#e67e22\" stroke-width=\"1.4\"/><text x=\"360\" y=\"96\" font-size=\"9.5\" fill=\"#e67e22\" font-weight=\"700\" text-anchor=\"middle\">+4h</text><text x=\"360\" y=\"110\" font-size=\"9.5\" fill=\"#777\" font-weight=\"400\" text-anchor=\"middle\">NO data in</text><line x1=\"660\" y1=\"62\" x2=\"660\" y2=\"78\" stroke=\"#1a7a3a\" stroke-width=\"1.4\"/><text x=\"660\" y=\"96\" font-size=\"9.5\" fill=\"#1a7a3a\" font-weight=\"700\" text-anchor=\"middle\">+24h</text><text x=\"660\" y=\"110\" font-size=\"9.5\" fill=\"#777\" font-weight=\"400\" text-anchor=\"end\">validators' final</text><text x=\"60\" y=\"40\" font-size=\"9.5\" fill=\"#777\" font-weight=\"400\" text-anchor=\"start\">Network operators stream chunks throughout the block; validators stake X SN to participate</text></svg>"}], "notes": [{"match": "Mining Pool 1", "sub": "Multiple-mechanism feature", "verdict": "mixed", "html": "Mapping Pool 0 / Pool 1 onto Bittensor's <a href=\"https://docs.learnbittensor.org/subnets/understanding-multiple-mech-subnets\" target=\"_blank\" rel=\"noopener\">multiple-incentive-mechanisms feature</a> is correct and current, but two live constraints bite the whitepaper's \u00a715.1 parameters. The chain caps a subnet at 2 mechanisms today, and requires mechanism_count \u00d7 max_UIDs &lt; 256 \u2014 so running both pools forces max_allowed_uids below 128 each, not the 256 the doc assumes, capping NOs-per-pool. Validators also can't opt out of a mechanism without losing dividends, so every validator must run /verify trails for both pools."}], "expl": [{"match": "sn", "tag": "In plain English", "title": "Who's who \u2014 and what it costs to join", "html": "<ul><li><strong>Network operator</strong> \u2014 runs the servers and manages a pool of workers. To join: get registered and pay a small one-time slot fee, then deposit \u03b1 every 7 days. There is <strong>no fixed stake</strong> \u2014 the deposit is a dial you set yourself, ideally no more than your real revenue.</li><li><strong>Miner (provider)</strong> \u2014 a worker <em>inside</em> an operator's pool that carries the actual VPN traffic. Not the same as an operator: one operator can have 100,000+ miners.</li><li><strong>Validator</strong> \u2014 an independent referee. Stakes its own \u03b1 and runs the <code>/verify</code> test to prove which providers are really online, then scores the pools and steers the rewards.</li><li><strong>Owner</strong> \u2014 the foundation that runs the subnet and governs the contract.</li></ul>"}, {"match": "Mining Pool 0", "tag": "Investor lens", "title": "Pool 0 is the v1 product", "html": "Pool 0 (\u201cthe core network\u201d) is what launches first and where Pool-0 \u03b1 emissions come from; the 7-day block is the settlement unit. Validators must stake \u03b1 to take part \u2014 the standard Bittensor gate you already know."}]}, {"id": "incentives", "title": "INCENTIVES", "sub": "Economic design & intent", "md": "# UR BitTensor subnet incentives and design\n\nWe are building a new BitTensor subnet to run a decentralized privacy network with the components below.\n\n\n## Explanation of components\n\nBlock size: 7 days\nSubnet contract accumulates payments and emissions over the course of the block, to be distributed at the end of the block.\nThe payout from the subnet contract is weighted by the payment of the network operator over the total payments, and then distributes the balance according to each network operator's distribution.\n\nNetwork operator: runs the servers. Each network operator has a mining slot and a validator slot on the BitTensor subnet, which are pooled rewards for their attached miners and validators. The network operator determines the payout from their mining slots. The network operator pays into the subnet contract per used GB and active user (per month) based on the global fixed rate. \nMiner: connects to one or more network operators simultaneously. Providers provide egress and ingress traffic. Miners accumulate contracts, issued by the network operator. Miners accumulate reliability, issues by the network operator.\nValidator: connects to one or more network operators. Follows the validation protocol described in VERIFIER.md. Accumulates signed validated paths from the network operator.\n\nThe only mechanism that keeps the components coordinating are the incentives below.\n\n\n## Incentive Direction\n\nExplanation of ST contract approach for miners:\n- NO deposits into ST contract per GB and per user. The rate is set by an oracle. Deposit transaction DT\n- NO publishes their own payout list ever block into an oracle\n- NO publishes list of their deposits and signs with wallet\n- The SUM(DT) for each NO weights the payout from balance+emissions for the NO payout list\nExplanation of miner incentives: the NO will want to maximize their deposits, to encourage more providers on their network. The cost of deposits will be constrained by the revenue of the NO, which reflects real usage (data and active users). NOs compete with each other for providers. Providers will only join NOs that are profitable.\n\nExplanation of ST contract approach for validators:\n- V deposits into ST for each validated path a validation fee. Validation transaction VT\n- NO publishes validated paths into an oracle. V uses their wallet PK as their validation path key\n- SUM(DT) weights the emissions payout for the NO validators list. The NO and the V split INTERSECTION(VT,NO)/UNION(VT,NO) of the payout. The rest goes to the owners (e.g. disagreement goes to the subnet owners)\nExplanation of validator incentives: prisoner's dilemma: the NO and V will get the most outcome by honestly reporting. The cost of V misreporting is the deposit cost. The cost of the NO misreporting is lowered rewards. The owners want healthy validators to improve the product quality. The rational measure of fake V is how much NOs mistrust each other, or how much the owners mistrust the NOs.\n\nOpen questions:\n- How is oracle data stored and charged on SubTensor? Can we adapt the network operator payout table to use a Merkle tree so that each miner can validate their payout without having to store it on chain?\n- Are smart contracts standard EVM?\n- How to adapt this to standard BT payout formulas?\n\n\n## Design goals\n\nWe want to build BitTensor smart contract and emission schedule to run this subnet. It should follow the best practice and payout formulas established by the BitTensor community.\n\nSpend extra time on deep research so that we capture the current state of BitTensor accurately.\n\nCreate a WHITEPAPER.md that desribes in detail enough that it can be clearly implemented how this subnet will work.\n", "viz": [{"match": "Explanation of components", "cap": "The coordinating components \u2014 held together only by incentives", "svg": "<svg viewBox=\"0 0 720 210\" xmlns=\"http://www.w3.org/2000/svg\" style=\"font-family:var(--sans)\"><defs><marker id=\"ah\" markerWidth=\"9\" markerHeight=\"9\" refX=\"6.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7,3 L0,6 Z\" fill=\"#999\"/></marker><marker id=\"ahg\" markerWidth=\"9\" markerHeight=\"9\" refX=\"6.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7,3 L0,6 Z\" fill=\"#1a7a3a\"/></marker><marker id=\"ahr\" markerWidth=\"9\" markerHeight=\"9\" refX=\"6.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7,3 L0,6 Z\" fill=\"#c0392b\"/></marker><marker id=\"ahb\" markerWidth=\"9\" markerHeight=\"9\" refX=\"6.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7,3 L0,6 Z\" fill=\"#2471a3\"/></marker><marker id=\"ahw\" markerWidth=\"9\" markerHeight=\"9\" refX=\"6.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7,3 L0,6 Z\" fill=\"#e67e22\"/></marker></defs><rect x=\"280\" y=\"24\" width=\"160\" height=\"50\" rx=\"5\" fill=\"#f9fafb\" stroke=\"#ddd\" stroke-width=\"1\" /><rect x=\"280\" y=\"24\" width=\"4.5\" height=\"50\" rx=\"2\" fill=\"#e67e22\"/><text x=\"360.0\" y=\"46.0\" font-size=\"12.5\" fill=\"#111\" font-weight=\"700\" text-anchor=\"middle\">Network Operator</text><text x=\"360.0\" y=\"61.0\" font-size=\"10.0\" fill=\"#777\" font-weight=\"400\" text-anchor=\"middle\">runs servers \u00b7 sets payouts</text><rect x=\"40\" y=\"140\" width=\"180\" height=\"52\" rx=\"5\" fill=\"#e8f5ee\" stroke=\"#1a7a3a\" stroke-width=\"1\" /><rect x=\"40\" y=\"140\" width=\"4.5\" height=\"52\" rx=\"2\" fill=\"#1a7a3a\"/><text x=\"130.0\" y=\"163.0\" font-size=\"12.5\" fill=\"#1a7a3a\" font-weight=\"700\" text-anchor=\"middle\">Miner / Provider</text><text x=\"130.0\" y=\"178.0\" font-size=\"10.0\" fill=\"#777\" font-weight=\"400\" text-anchor=\"middle\">egress+ingress \u00b7 earns contracts</text><rect x=\"500\" y=\"140\" width=\"180\" height=\"52\" rx=\"5\" fill=\"#eaf2f8\" stroke=\"#2471a3\" stroke-width=\"1\" /><rect x=\"500\" y=\"140\" width=\"4.5\" height=\"52\" rx=\"2\" fill=\"#2471a3\"/><text x=\"590.0\" y=\"163.0\" font-size=\"12.5\" fill=\"#2471a3\" font-weight=\"700\" text-anchor=\"middle\">Validator</text><text x=\"590.0\" y=\"178.0\" font-size=\"10.0\" fill=\"#777\" font-weight=\"400\" text-anchor=\"middle\">follows VERIFIER.md</text><rect x=\"280\" y=\"140\" width=\"160\" height=\"52\" rx=\"5\" fill=\"#f9fafb\" stroke=\"#111\" stroke-width=\"1\" /><rect x=\"280\" y=\"140\" width=\"4.5\" height=\"52\" rx=\"2\" fill=\"#1a7a3a\"/><text x=\"360.0\" y=\"163.0\" font-size=\"12.5\" fill=\"#111\" font-weight=\"700\" text-anchor=\"middle\">ST Contract</text><text x=\"360.0\" y=\"178.0\" font-size=\"10.0\" fill=\"#777\" font-weight=\"400\" text-anchor=\"middle\">accrues + distributes</text><line x1=\"300\" y1=\"74\" x2=\"180\" y2=\"140\" stroke=\"#e67e22\" stroke-width=\"1.5\" marker-end=\"url(#ahw)\"/><text x=\"206\" y=\"104\" font-size=\"9.5\" fill=\"#777\" font-weight=\"400\" text-anchor=\"end\">issues contracts</text><line x1=\"420\" y1=\"74\" x2=\"560\" y2=\"140\" stroke=\"#e67e22\" stroke-width=\"1.5\" marker-end=\"url(#ahw)\"/><text x=\"516\" y=\"104\" font-size=\"9.5\" fill=\"#777\" font-weight=\"400\" text-anchor=\"start\">signs paths</text><line x1=\"360\" y1=\"74\" x2=\"360\" y2=\"140\" stroke=\"#e67e22\" stroke-width=\"1.5\" marker-end=\"url(#ahw)\"/><text x=\"368\" y=\"108\" font-size=\"9.5\" fill=\"#777\" font-weight=\"400\" text-anchor=\"start\">pays in per GB/user</text><text x=\"360\" y=\"206\" font-size=\"9.5\" fill=\"#777\" font-weight=\"400\" text-anchor=\"middle\">Block size = 7 days \u00b7 contract accrues payments + emissions, distributes at block end</text></svg>"}, {"match": "Incentive Direction", "cap": "Incentive direction \u2014 SUM(DT) weights the payout; honesty is the dominant strategy", "svg": "<svg viewBox=\"0 0 720 210\" xmlns=\"http://www.w3.org/2000/svg\" style=\"font-family:var(--sans)\"><defs><marker id=\"ah\" markerWidth=\"9\" markerHeight=\"9\" refX=\"6.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7,3 L0,6 Z\" fill=\"#999\"/></marker><marker id=\"ahg\" markerWidth=\"9\" markerHeight=\"9\" refX=\"6.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7,3 L0,6 Z\" fill=\"#1a7a3a\"/></marker><marker id=\"ahr\" markerWidth=\"9\" markerHeight=\"9\" refX=\"6.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7,3 L0,6 Z\" fill=\"#c0392b\"/></marker><marker id=\"ahb\" markerWidth=\"9\" markerHeight=\"9\" refX=\"6.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7,3 L0,6 Z\" fill=\"#2471a3\"/></marker><marker id=\"ahw\" markerWidth=\"9\" markerHeight=\"9\" refX=\"6.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7,3 L0,6 Z\" fill=\"#e67e22\"/></marker></defs><rect x=\"40\" y=\"40\" width=\"180\" height=\"50\" rx=\"5\" fill=\"#e8f5ee\" stroke=\"#1a7a3a\" stroke-width=\"1\" /><text x=\"130.0\" y=\"62.0\" font-size=\"12.5\" fill=\"#1a7a3a\" font-weight=\"700\" text-anchor=\"middle\">NO deposits (DT)</text><text x=\"130.0\" y=\"77.0\" font-size=\"10.0\" fill=\"#777\" font-weight=\"400\" text-anchor=\"middle\">\u221d GB + active users</text><line x1=\"220\" y1=\"65\" x2=\"300\" y2=\"65\" stroke=\"#1a7a3a\" stroke-width=\"1.5\" marker-end=\"url(#ahg)\"/><rect x=\"300\" y=\"40\" width=\"150\" height=\"50\" rx=\"5\" fill=\"#f9fafb\" stroke=\"#111\" stroke-width=\"1\" /><text x=\"375.0\" y=\"62.0\" font-size=\"12.5\" fill=\"#111\" font-weight=\"700\" text-anchor=\"middle\">SUM(DT) weight</text><text x=\"375.0\" y=\"77.0\" font-size=\"10.0\" fill=\"#777\" font-weight=\"400\" text-anchor=\"middle\">share of payout</text><line x1=\"450\" y1=\"65\" x2=\"530\" y2=\"65\" stroke=\"#1a7a3a\" stroke-width=\"1.5\" marker-end=\"url(#ahg)\"/><rect x=\"530\" y=\"40\" width=\"160\" height=\"50\" rx=\"5\" fill=\"#e8f5ee\" stroke=\"#1a7a3a\" stroke-width=\"1\" /><text x=\"610.0\" y=\"62.0\" font-size=\"12.5\" fill=\"#1a7a3a\" font-weight=\"700\" text-anchor=\"middle\">NO payout list</text><text x=\"610.0\" y=\"77.0\" font-size=\"10.0\" fill=\"#777\" font-weight=\"400\" text-anchor=\"middle\">to its providers</text><text x=\"140\" y=\"120\" font-size=\"11.0\" fill=\"#111\" font-weight=\"700\" text-anchor=\"start\">Validator prisoner's dilemma</text><rect x=\"40\" y=\"130\" width=\"180\" height=\"60\" rx=\"4\" fill=\"#f9fafb\" stroke=\"#ddd\" stroke-width=\"1\" /><line x1=\"130\" y1=\"130\" x2=\"130\" y2=\"190\" stroke=\"#ebebeb\" stroke-width=\"1.3\"/><line x1=\"40\" y1=\"160\" x2=\"220\" y2=\"160\" stroke=\"#ebebeb\" stroke-width=\"1.3\"/><text x=\"85\" y=\"150\" font-size=\"9.5\" fill=\"#1a7a3a\" font-weight=\"700\" text-anchor=\"middle\">honest</text><text x=\"175\" y=\"150\" font-size=\"9.5\" fill=\"#c0392b\" font-weight=\"700\" text-anchor=\"middle\">lie</text><text x=\"85\" y=\"178\" font-size=\"9.5\" fill=\"#1a7a3a\" font-weight=\"700\" text-anchor=\"middle\">\u2713 best</text><text x=\"175\" y=\"178\" font-size=\"9.5\" fill=\"#c0392b\" font-weight=\"400\" text-anchor=\"middle\">deposit lost</text><rect x=\"300\" y=\"120\" width=\"390\" height=\"80\" rx=\"6\" fill=\"#f9fafb\" stroke=\"#ddd\" stroke-width=\"1\" /><text x=\"495\" y=\"142\" font-size=\"10.0\" fill=\"#333\" font-weight=\"400\" text-anchor=\"middle\">Cost of V misreporting = the deposit (VT)</text><text x=\"495\" y=\"162\" font-size=\"10.0\" fill=\"#333\" font-weight=\"400\" text-anchor=\"middle\">Cost of NO misreporting = lower rewards</text><text x=\"495\" y=\"184\" font-size=\"10.0\" fill=\"#777\" font-weight=\"400\" text-anchor=\"middle\">Owners want healthy validators \u2192 better product</text></svg>"}, {"match": "Design goals", "cap": "Design goal \u2014 adapt this intent to standard Bittensor payout formulas", "svg": "<svg viewBox=\"0 0 720 120\" xmlns=\"http://www.w3.org/2000/svg\" style=\"font-family:var(--sans)\"><defs><marker id=\"ah\" markerWidth=\"9\" markerHeight=\"9\" refX=\"6.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7,3 L0,6 Z\" fill=\"#999\"/></marker><marker id=\"ahg\" markerWidth=\"9\" markerHeight=\"9\" refX=\"6.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7,3 L0,6 Z\" fill=\"#1a7a3a\"/></marker><marker id=\"ahr\" markerWidth=\"9\" markerHeight=\"9\" refX=\"6.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7,3 L0,6 Z\" fill=\"#c0392b\"/></marker><marker id=\"ahb\" markerWidth=\"9\" markerHeight=\"9\" refX=\"6.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7,3 L0,6 Z\" fill=\"#2471a3\"/></marker><marker id=\"ahw\" markerWidth=\"9\" markerHeight=\"9\" refX=\"6.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7,3 L0,6 Z\" fill=\"#e67e22\"/></marker></defs><rect x=\"40\" y=\"40\" width=\"180\" height=\"46\" rx=\"5\" fill=\"#e8f5ee\" stroke=\"#1a7a3a\" stroke-width=\"1\" /><text x=\"130.0\" y=\"60.0\" font-size=\"12.5\" fill=\"#1a7a3a\" font-weight=\"700\" text-anchor=\"middle\">This incentive design</text><text x=\"130.0\" y=\"75.0\" font-size=\"10.0\" fill=\"#777\" font-weight=\"400\" text-anchor=\"middle\">deposit-weighted pools</text><line x1=\"220\" y1=\"63\" x2=\"300\" y2=\"63\" stroke=\"#1a7a3a\" stroke-width=\"1.5\" marker-end=\"url(#ahg)\"/><rect x=\"300\" y=\"40\" width=\"180\" height=\"46\" rx=\"5\" fill=\"#f9fafb\" stroke=\"#111\" stroke-width=\"1\" /><text x=\"390.0\" y=\"60.0\" font-size=\"12.5\" fill=\"#111\" font-weight=\"700\" text-anchor=\"middle\">Standard Yuma</text><text x=\"390.0\" y=\"75.0\" font-size=\"10.0\" fill=\"#777\" font-weight=\"400\" text-anchor=\"middle\">median \u00b7 clip \u00b7 bonds</text><line x1=\"480\" y1=\"63\" x2=\"560\" y2=\"63\" stroke=\"#1a7a3a\" stroke-width=\"1.5\" marker-end=\"url(#ahg)\"/><rect x=\"560\" y=\"40\" width=\"140\" height=\"46\" rx=\"5\" fill=\"#f9fafb\" stroke=\"#ddd\" stroke-width=\"1\" /><text x=\"630.0\" y=\"60.0\" font-size=\"12.5\" fill=\"#555\" font-weight=\"700\" text-anchor=\"middle\">WHITEPAPER.md</text><text x=\"630.0\" y=\"75.0\" font-size=\"10.0\" fill=\"#777\" font-weight=\"400\" text-anchor=\"middle\">implementable spec</text></svg>"}], "notes": [{"match": "Incentive Direction", "sub": "Collateral / burn signals", "verdict": "mixed", "html": "Anchoring emission to a costly operator deposit rhymes with collateral and burn mechanisms used elsewhere to make a signal costly (e.g. <a href=\"https://github.com/bactensor/collateral-contracts\" target=\"_blank\" rel=\"noopener\">collateral-contracts</a> and recycled registration burns). The self-dealing-via-wash-deposit risk the doc names is real; \u03c6 plus an independent validator baseline are the mitigations, and whether they are *sufficient* is the central open empirical question."}, {"match": "Incentive Direction", "sub": "Revenue-funded \u03b1 sinks (Targon)", "verdict": "support", "html": "The token-sink logic has a live comparable: <a href=\"https://taodaily.io/targon-subnet-4-explained-fast-inference-and-why-theyre-burning-alpha/\" target=\"_blank\" rel=\"noopener\">Targon (SN4) buys and burns \u03b1</a> with marketplace revenue, converting real demand into a permanent supply sink. UR's non-refundable \u03c6 slice plus buy-and-lock deposits do the same job. The investable read: marketplace subnets can route real revenue into \u03b1 demand \u2014 UR just makes that the central mechanism rather than a bolt-on."}], "expl": [{"match": "Incentive Direction", "tag": "Investor lens", "title": "The one bet to underwrite", "html": "Stripped down, the investable claim is: a costly \u03b1 deposit, bounded by real revenue, plus independent validators, will make emissions track genuine usage and resist wash-trading. \u03c6 and the independent-validator baseline are the levers; whether they're set high enough is the central empirical question \u2014 the thing to monitor post-launch."}]}, {"id": "verifier", "title": "VERIFIER", "sub": "/verify routing protocol", "md": "# `/verify` \u2014 Routing Verification Trails\n\nDesign document for the `/verify` API route: a competition in which **verifiers**\nwalk server-assigned chains of **providers** (`client_id`s), proving in real time\nthat they can egress from each provider, and producing per-provider liveness and\nlatency statistics.\n\nThis document specifies the three things needed to implement the route correctly:\nthe **signature mechanism**, the **probabilities / trail selection**, and the\n**statistics**. It also fixes the wire format, the server state model, and the\nsecurity scope.\n\n---\n\n## 1. What this proves (and what it does not)\n\nRead this first; it bounds every design choice below.\n\nA completed trail proves:\n\n- **Key custody** \u2014 the holder of the verifier private key endorsed this exact path.\n- **Real-time sequential transit** \u2014 the verifier egressed from each assigned\n  provider, in a server-chosen order revealed one hop at a time, so the path\n  cannot be precomputed and the provider egresses were live during the trail.\n- **Server attribution** \u2014 the server non-repudiably records which provider sat\n  at each hop (the *canonical provider*).\n\nA completed trail does **not** prove:\n\n- **Honest relay of real user traffic.** It measures reachability to *one known\n  destination* (the `/verify` endpoint) over the *cold path* with tiny packets. A\n  provider can prioritize that path and degrade everything else (\"teaching to the\n  test\"). Closing this needs **destination diversity** (\u00a710), not signatures.\n- **Non-self-dealing per-hop.** At the server, \"provider X relayed the verifier's\n  packet\" and \"X originated the packet from its own egress\" are the same\n  observable. A party that runs both the verifier and provider X can fake X's\n  *own* measurement. Whole-trail forgery is bounded by \u00a76 (needs majority of\n  `client_id`s); per-hop self-dealing is **not** \u2014 it needs only X, and is\n  defended only statistically, conditional on an independent verifier population\n  (\u00a77.7, \u00a710).\n\n**Operating assumptions** (the system is only as good as these):\n\n1. No single party controls a majority of provider `client_id`s.\n2. The verifier population is **independent of the providers it measures.** This is\n   an **open competition** \u2014 anyone may run a verifier \u2014 so this is a property we\n   *approximate*, not a precondition we can assume. v1 relies on an honest verifier\n   *majority* providing a clean baseline against which self-dealing and adversarial\n   abandonment show up statistically (\u00a77.5, \u00a77.7); the structural defenses that make\n   it hold under adversarial verifiers are the \u00a710 roadmap.\n3. Source IP cannot be spoofed (TCP return path) \u2014 so a request's source IP is\n   evidence the packet truly egressed from that provider.\n4. Each eligible provider maps to exactly one egress IP, and that IP resolves to\n   exactly that provider (\u00a78) \u2014 enforced by eligibility, not assumed.\n\n**v1 scope \u2014 best effort as a first step.** This document specifies a shippable\nfirst version for an open competition. v1 includes the affordable defenses\n(real-time unpredictable paths \u00a75.1, server-stamped time \u00a73.4, per-trail nonces,\nSEED auth + rate limits + poisoning \u00a79, per-step latency \u00a77.5, reputation-weighted\nstats and anomaly detection \u00a77.7). v1 **defers** the structural defenses \u2014\n**proof-of-routing**, **destination diversity**, and **verifier Sybil resistance**\n(\u00a710) \u2014 and is therefore suitable initially for *internal liveness/latency\nmonitoring and provisional scoring*, not yet for high-value payouts. \u00a710 is the\nexplicit path from here to payout-grade.\n\n---\n\n## 2. Roles and identities\n\nEvery `/verify` request involves three identities. Keeping them distinct is the\nsingle most important implementation point.\n\n| Role | Identity | How the server learns it |\n|------|----------|--------------------------|\n| **Verifier** | Ed25519 public key `vpk` (a `client_id`'s registered key) | From the request body + signature |\n| **Hop / provider** | provider `client_id` | From the **source IP** of the request \u2192 egress-IP index (\u00a78.1) |\n| **Server** | Ed25519 server key `(server_key_id, server_sk)` | Published out of band |\n\n- The **verifier** is whoever is building the trail. Reuse the existing per-client\n  Ed25519 key: `model.GetClientPublicKey(ctx, verifierClientId)` already returns a\n  raw 32-byte Ed25519 public key (`network_client_key_model.go:24`,\n  Redis `ckey_<clientId>`). The verifier signs with the matching device private\n  key. (A competition-only ephemeral key also works; the protocol only needs an\n  Ed25519 `vpk`.)\n- The **hop** is the provider the verifier is *currently egressing through*. The\n  server derives it from the request source IP \u2014 the verifier never asserts it.\n  This is the anchor of the whole proof.\n- The **server** holds a dedicated Ed25519 signing key for assignments and\n  finalization. Publish the public half so third parties can verify finished\n  trails. Carry `server_key_id` (1 byte) in signed messages for rotation.\n\n---\n\n## 3. Cryptographic mechanism\n\n### 3.1 Primitive\n\n**Ed25519 (EdDSA), everywhere.** Rationale: deterministic nonces (no ECDSA\nnonce-reuse footgun), 32-byte keys, 64-byte signatures, fast, in the Go stdlib\n(`crypto/ed25519`), and already the per-client key type in this codebase. This is\na **signature** scheme \u2014 there is no encryption in this design; confidentiality is\nnot a goal.\n\n> If a verifier signature is ever used as a map key / dedup token, hash it\n> (SHA-256) first or enforce RFC 8032 canonical `S`. Do not use a raw signature as\n> a unique identifier \u2014 Ed25519 signatures are weakly malleable.\n\n### 3.2 The four signatures\n\nTwo are produced by the verifier, two by the server. Each is computed over a\n**canonical binary message** (Appendix A), never over JSON. Each message begins\nwith the global context string `\"urnetwork/verify/v1\"` and a 1-byte `msg_type`,\nwhich together provide domain separation from every other Ed25519 use in the\ncodebase and from each other.\n\n| # | Name | Signed by | `msg_type` | Binds / proves |\n|---|------|-----------|-----------|----------------|\n| 1 | **SEED** | verifier `vsk` | `0x01` | \"I, holder of `vpk`, am starting a trail\" (key ownership) |\n| 2 | **EXTEND** | verifier `vsk` | `0x02` | \"`vpk` has reached this exact ordered path under this trail nonce\" |\n| 3 | **ASSIGN** | server `server_sk` | `0x03` | \"the server assigned this next hop in this trail\" (non-repudiable, unpredictable) |\n| 4 | **FINAL** | server `server_sk` | `0x04` | \"the server attests `vpk` completed this exact timed path\" |\n\nWhat each one is *for*:\n\n- **SEED** authenticates trail creation to `vpk` from the very first hop, so a\n  trail cannot be started or hijacked by anyone not holding `vsk`.\n- **EXTEND** is the verifier's claim, signed at every hop, over the whole path so\n  far *including the hop it is currently claiming to have reached*. Because the\n  EXTEND at depth `M` covers all `M` `client_id`s, **the final EXTEND alone\n  endorses the entire completed path** \u2014 that is the signature published in the\n  proof. EXTEND covers `client_id`s and the trail header only; **times are not\n  signed by the verifier** (the server is authoritative for time, \u00a73.4).\n- **ASSIGN** commits the server to each randomly-sampled next hop. Because it is\n  bound to the per-trail `server_nonce` and returned only *after* the current hop\n  succeeds, it is the anti-precomputation commitment: the verifier cannot learn or\n  grind future hops.\n- **FINAL** is the published attestation. It covers all `M` confirmed hops **with\n  their server-stamped times**, so the public proof carries timing.\n\n### 3.3 The published proof\n\nWhen a trail reaches depth `M`, the server publishes and returns:\n\n```\nproof = {\n  header:      { trail_id, server_nonce, vpk, M },\n  hops:        [ (client_id_1, time_ms_1), \u2026, (client_id_M, time_ms_M) ],\n  final_sig:   FINAL signed by server_sk,   // server_key_id included\n  verifier_sig: EXTEND at depth M signed by vsk\n}\n```\n\nAnyone with the server's published Ed25519 public key can verify:\n\n- `final_sig` \u21d2 the server attests this timed path occurred, and\n- `verifier_sig` \u21d2 the holder of `vpk` walked exactly this path.\n\nTogether they are a non-repudiable completed trail credited to `vpk`. (Recall from\n\u00a71: this attests *transit*, not honest relay.)\n\n### 3.4 Time\n\nEvery hop time is **server-stamped** with `server.NowUtc()` at the instant the hop\nis confirmed, encoded as unix-milliseconds `uint64`. Verifier-supplied time is\nnever trusted and never signed by the verifier. This makes the latency signal\n(\u00a77) authoritative and unforgeable by the verifier.\n\n### 3.5 Server key management\n\n- One active Ed25519 signing key, addressed by `server_key_id` (1 byte), included\n  in every ASSIGN/FINAL message so old proofs verify across rotations.\n- Store the private key alongside the existing JWT signing material\n  (`jwt/by_jwt.go` loads keys from the `jwt.yml` vault resource \u2014 add a\n  `verify.yml` peer, or an Ed25519 entry).\n- Publish all historical public keys (keyed by `server_key_id`) at a stable URL so\n  proofs remain verifiable.\n\n---\n\n## 4. Trail lifecycle\n\n```\n            routes through A (verifier's chosen entry)\nverifier  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u25ba  POST /verify   (SEED: vpk, vsig)\n                                                           src IP \u2192 hop = A\n                                          server: new trail_id, server_nonce,\n                                                  trail = [A@t0], sample next = B\n            \u25c4\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500  { trail_id, server_nonce,\n                                                             trail, next_hop=B, assign_sig }\n\n            routes through B\nverifier  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u25ba  POST /verify   (EXTEND over [A,B], vsig)\n                                                           src IP \u2192 hop = B\n                                          server: verify vsig under vpk,\n                                                  check src==B==pending tail,\n                                                  stamp t1, record latency(B),\n                                                  trail = [A@t0, B@t1], sample next = C\n            \u25c4\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500  { \u2026, next_hop=C, assign_sig }\n\n            \u2026 repeat until depth == M \u2026\n\n                                          server: depth==M \u2192 FINAL, publish proof\n            \u25c4\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500  { status: \"complete\", proof }\n```\n\n### 4.1 SEED (depth 0 \u2192 1)\n\nThe verifier picks an entry provider `A`, routes through it, and calls `/verify`\nwith no trail.\n\nRequest body:\n```json\n{ \"vpk\": \"<base64 32B>\", \"client_nonce\": \"<base64 32B>\", \"seed_sig\": \"<base64 64B>\", \"M\": 8 }\n```\n\nServer:\n1. Resolve source IP \u2192 hop `client_id` `A` (\u00a78.1). If unresolved \u2192 **poison path**\n   (\u00a79), but proceed indistinguishably.\n2. Verify `seed_sig` is a valid SEED signature under `vpk` (Appendix A.1).\n3. Check `vpk`'s `client_id` is allowed to verify and is **not** `A` (a verifier\n   may not seed through itself). Apply seed rate limits (\u00a79).\n4. Check `A` is an eligible provider: `model.GetProvideModes(ctx, A)` is non-empty\n   **and** `A` holds an eligibility token (\u00a75.3).\n5. Create trail: `trail_id = server.NewId()`, `server_nonce` = 32 random bytes,\n   `M` (clamp to `[MMin, MMax]`), `t0 = server.NowUtc()`, confirmed hops `= [A@t0]`.\n   **`A` is the verifier-chosen seed \u2014 exclude it from statistics (\u00a77.5).**\n6. Sample next hop `B` (\u00a75). Append pending `B`. Produce ASSIGN.\n7. Persist trail (\u00a78.2). Return `{ trail_id, server_nonce, trail, next_hop: B, assign_sig }`.\n\n### 4.2 EXTEND (depth k \u2192 k+1)\n\nThe verifier routes through the pending hop it was given and calls `/verify` with\nthe trail.\n\nRequest body:\n```json\n{ \"trail_id\": \"<id>\", \"trail\": [\"<A id>\",\"<B id>\", \u2026, \"<pending hop id>\"],\n  \"extend_sig\": \"<base64 64B>\" }\n```\n\nServer (all checks must pass; any failure \u2192 \u00a74.4):\n1. Resolve source IP \u2192 hop `client_id` `C` (\u00a78.1).\n2. Load trail by `trail_id`. Require `status == active` and not expired.\n3. Verify the submitted `trail` equals the server's recorded confirmed hops **plus\n   the single pending hop** \u2014 the verifier may not rewrite history.\n4. Verify `extend_sig` is a valid EXTEND under the trail's `vpk` over the canonical\n   path of those `client_id`s (Appendix A.2).\n5. **Check `C == pending_hop`** \u2014 the request truly egressed from the assigned\n   provider. (This is \"caller `client_id` matches the tail.\")\n6. Confirm the hop: stamp `t_k = server.NowUtc()`, move pending \u2192 confirmed,\n   **record `latency = t_k \u2212 assigned_at` for provider `C` (\u00a77)**.\n7. If `depth == M`: produce FINAL, mark `complete`, persist & publish proof (\u00a73.3),\n   return `{ status: \"complete\", proof }`.\n   Else: sample next hop `D` (\u00a75), append pending `D`, produce ASSIGN, return\n   `{ trail_id, server_nonce, trail, next_hop: D, assign_sig }`.\n\n### 4.3 Idempotency / retries\n\nA verifier may resend the same EXTEND (packet loss). If the submitted trail matches\na hop already confirmed, return the **same** ASSIGN response (store the last\nresponse per trail). Do not double-count latency or advance depth.\n\n### 4.4 Failure / expiry\n\n- If any EXTEND check fails, or the pending hop is not confirmed within `StepTimeout`\n  `T`, the step **fails**. Record the failure against the **pending next hop**\n  (the provider that was never reached) \u2014 see \u00a77.2 \u2014 and move the trail to\n  `expired`. Do not publish.\n- Failures and expiries are the raw material for the statistics. They are inferred\n  from *silence* (an ASSIGN that never produced a matching EXTEND), so they are\n  noisy; \u00a77 handles the attribution and confounds.\n\n---\n\n## 5. Trail selection & probabilities\n\n### 5.1 Next-hop sampling\n\nAt each assignment step the server draws the next hop **uniformly at random,\nwithout replacement within the trail**, from the eligible set:\n\n```\neligible(trail) = { c : c has an active ProvideMode }\n               \u2229 { c : c has exactly one known egress IP (\u00a78.1, \u00a78.2) }\n               \u2229 { c : c holds an eligibility token (\u00a75.3) }\n               \\ { hops already in trail }  \\ { verifier's own client_id }\n```\n\nDraw with a CSPRNG (`crypto/rand`). Let `n = |eligible(trail)|` at the draw; record\n`n` with the assignment so the analysis knows the exact assignment probability\n`1/n` (\u00a77.3). Without replacement guarantees each trail exercises `M` *distinct*\nproviders (path diversity) and lets a failure be attributed to a single provider.\n\n> **Anti-precomputation:** the ASSIGN for hop `k+1` is computed and returned **only\n> after** hop `k` is confirmed, and is bound to `server_nonce`. The verifier\n> therefore cannot see, grind, or pre-position the path beyond the current hop.\n\n### 5.2 Core probabilities\n\nLet `N` = number of eligible providers, `M` = trail depth, and consider a provider\n`X` that is not the seed.\n\n- **Per-step assignment:** at a draw with candidate-set size `n`,\n  `P(assign X) = 1/n`. With a stable eligible set, `n \u2248 N \u2212 (hops used)`.\n- **Appearance in a trail:** the `M\u22121` server-assigned positions are a uniform\n  random `(M\u22121)`-subset of the `N\u22121` non-seed providers, so\n  ```\n  P(X \u2208 trail)  \u2248  (M \u2212 1) / (N \u2212 1)  \u2248  M / N      (large N)\n  ```\n- **Exposure rate (sizing):** if trails start at rate `\u03bb` (trails/sec), the total\n  assignment rate is `\u03bb(M\u22121)`/sec, spread over `N` providers, so each provider is\n  assigned about\n  ```\n  \u03c1  \u2248  \u03bb (M \u2212 1) / N      assignments per second.\n  ```\n  Use `\u03c1` to size the eligibility interval (\u00a75.3) and to know how long until a\n  provider accumulates the minimum sample `a_min` (\u00a77.3): `\u2248 a_min / \u03c1` seconds.\n\n### 5.3 Eligibility (rate / coverage control)\n\nEach provider carries a token bucket that refills **one token every\n`EligibilityInterval`** seconds (the original \"a token every N seconds for each\nip\"), capped at a small burst. A provider is assignable only if it has a token; on\nassignment, spend one. This:\n\n- caps each provider's measurement rate (spreads coverage over time), and\n- bounds how often any one provider can be measured \u2014 which also bounds how often a\n  self-dealer can harvest its *own* node's measurements (\u00a77.7).\n\n**Design note (deliberate change from the original sketch):** the server *samples\namong eligible providers and pushes* the assignment, rather than granting the token\nto \"the first request after the eligible time.\" A first-come grant is a latency\nrace that biases assignment toward fast-polling verifiers and well-connected\nproviders \u2014 i.e. it biases by network proximity, not provider quality, which would\ninvalidate the equal-probability baseline the statistics depend on. Server-push\nsampling keeps the baseline clean.\n\nImplement the bucket in Redis: key `{velig_<clientId>}` (own hash-tag slot),\n`INCR`+`EXPIRE` style as in `connect/transport_rate_limit.go:124`, or a token count\nwith a refill timestamp.\n\n### 5.4 Resistance to whole-trail forgery (the \"needs majority\" result)\n\nIf one party owns `k` of the `N` providers (fraction `f = k/N`), the probability\nthat *every* randomly-assigned hop of a trail lands on owned providers is\n```\nP(all M\u22121 assigned hops owned) = C(k, M\u22121) / C(N\u22121, M\u22121)  \u2248  f^(M\u22121).\n```\nExample: `N = 10000`, `M = 8`, `k = 1000` (10%) \u2192 `0.1^7 = 1e-7`. To complete a\nmeaningful fraction of trails purely through owned nodes, `f` must approach 1 \u2014\ni.e. whole-trail integrity reduces to \"no party owns a majority of `client_id`s,\"\nan existing network assumption. **This does not bound per-hop self-dealing**, which\nneeds only `k = 1` (\u00a77.7).\n\n### 5.5 Parameters\n\n| Symbol | Name | Default | Notes |\n|--------|------|---------|-------|\n| `M` | trail depth | 8 | `f^(M\u22121)` forgery resistance vs. completion difficulty |\n| `MMin/MMax` | clamp on requested `M` | 4 / 16 | reject out-of-range |\n| `T` | `StepTimeout` | 30 s | defines a step \"failure\" |\n| `EligibilityInterval` | token refill | 60 s | size from `\u03c1` (\u00a75.2) and target sample rate |\n| `TrailTTL` | trail lifetime | `M\u00b7T` + 60 s | GC abandoned trails |\n| `a_min` | min exposure to report a provider | 30 | \u00a77.3 |\n| seed limits | per-source-IP, per-`vpk` seed rate | tune | \u00a79 |\n\n---\n\n## 6. Trail state model\n\n### 6.1 Records (Redis, with cluster-safe hash tags)\n\n> **Cluster rule:** keys touched in one pipeline/transaction must share a `{\u2026}`\n> hash tag (see the Redis pipeline slot rule the codebase already follows, e.g.\n> `{pm_<clientId>}`). Tag every key for one trail with `{vtr_<trail_id>}` so a\n> single `TxPipelined` over that trail stays in one slot.\n\nPer trail (`{vtr_<trail_id>}`):\n```\nheader        : vpk(32B), server_nonce(32B), M, status, created_at, last_activity\nhops          : ordered [ (client_id, assigned_at, confirmed_at|null, assign_n) ]\npending       : (client_id, assigned_at, assign_n)         // the tail awaiting arrival\nlast_response : cached JSON for idempotent retries (\u00a74.3)\n```\nSet `EXPIRE = TrailTTL`; an expired key whose status was `active` is an abandoned\ntrail and should be swept into the failure stats (\u00a77) by a reaper before/at expiry.\n\nPer provider, for statistics (`{vstat_<clientId>}`):\n```\nassignments, confirmations          // counters\nlatency samples (reservoir or t-digest for percentiles)\n```\n\n### 6.2 Published proofs (Postgres)\n\nPersist completed proofs durably for audit and point accounting:\n```sql\nCREATE TABLE verify_trail (\n    trail_id      uuid PRIMARY KEY,\n    vpk           bytea NOT NULL,         -- verifier Ed25519 public key\n    server_key_id smallint NOT NULL,\n    server_nonce  bytea NOT NULL,\n    depth         smallint NOT NULL,      -- = M for complete\n    status        smallint NOT NULL,      -- complete | expired\n    hops_json     text NOT NULL,          -- [(client_id, time_ms), \u2026]\n    final_sig     bytea,                  -- server FINAL (null if expired)\n    verifier_sig  bytea,                  -- verifier EXTEND@M (null if expired)\n    create_time   timestamp NOT NULL,\n    complete_time timestamp\n);\n```\nUse `server.Tx` / `server.Db` (`db.go:540` / `:376`). Points per proof are computed\nfrom this table; the scoring function is out of scope here.\n\n---\n\n## 7. Statistics \u2014 finding the weakest provider\n\nGoal: per-provider quality, comparable across providers. The naive \"incomplete\ntrails per `client_id` / completed trails per `client_id`\" is **wrong** because a\ntrail is a path \u2014 it confounds which hop failed, censors providers downstream of a\nfailure, and mixes verifier abandonment with provider failure. Use the following.\n\n### 7.1 Why rewarding *complete* trails yields the cleanest *incomplete*-trail data\n\nThe data we want is the failures; the thing we pay for is completions. That is not a\ncontradiction \u2014 it is the mechanism. Rewarding completion is exactly what makes a\nfailure *attributable to a provider* instead of noise:\n\n- **Completion reward \u21d2 maximum verifier effort.** A verifier paid only when a trail\n  finishes will push every trail as hard as it can. So a hop that fails *despite* a\n  verifier straining to complete it is strong evidence the **provider** was the\n  blocker \u2014 not that the verifier was lazy or lost interest. The failure signal is a\n  *byproduct* of honest maximal effort, and it gets cleaner as the reward grows.\n\n- **The unpredictable reveal makes \"tried hardest\" structural, not just rational.**\n  Each next hop is revealed only after the current one is confirmed (\u00a75.1), so a\n  verifier cannot see the path ahead and cannot route around a provider it suspects\n  is weak. At the assigned hop its only choices are *attempt it* or *abandon the\n  whole trail* and forfeit all accumulated progress. The mechanism thus forces the\n  verifier to exercise the very providers we sampled, in the proportion we sampled\n  them \u2014 it cannot cherry-pick the easy ones, so every provider's failures get\n  observed under the same maximal-effort conditions.\n\n- **Incentivizing failure *directly* would be the real mismatch.** If we paid for\n  reported failures we would get *manufactured* ones \u2014 verifiers inducing or faking\n  failures for reward. Completion is the only incentive that aligns the verifier with\n  *trying*, rather than with the outcome we are trying to measure. We never pay for a\n  failure; we pay for the effort, and read the failures that effort could not\n  overcome.\n\n- **The reward sorts marginal providers onto the right axis \u2014 a feature.** A verifier\n  straining to finish will retry a marginal hop rather than quit, turning a\n  near-failure into a *high-latency completion* instead of an incomplete. So the\n  binary incomplete signal collapses toward \"**truly dead / unreachable**,\" while the\n  graded quality of slow-but-working providers moves into the **latency tail** (\u00a77.3).\n  Read both axes: latency percentiles for degradation, incompletes for outright\n  failure.\n\nThis is why the rest of \u00a77 is built the way it is. **Per-transition attribution**\n(\u00a77.2) blames a failure on the one provider that was never reached, so maximal effort\npoints the signal at a single hop. **Per-step latency recording** (\u00a77.5) ensures that\neven when a verifier rationally restarts a slow trail, the slow measurement it already\nproduced is kept rather than censored. The honest residual \u2014 that rewarding completion\n*purifies* but does not *eliminate* abandonment (a verifier can still crash, or\nadversarially abandon to grief a competitor) \u2014 is what reputation weighting and the\nindependence assumption (\u00a77.7, \u00a71) are for, and is the boundary v1 accepts (\u00a710).\n\n### 7.2 Attribution: per-transition, not per-trail\n\nA trail fails at exactly one hop: it reached confirmed tail `Z`, was assigned next\nhop `Y`, and never produced a valid EXTEND from `Y`. **Attribute the failure to the\npending next hop `Y`** (the provider that was never reached), never to the whole\npath. Concretely, per provider `Y`:\n```\na_Y = # times Y was a (server-assigned, non-seed) next hop      // exposure\nc_Y = # times an EXTEND from Y confirmed within T               // success\nf_Y = a_Y \u2212 c_Y                                                 // failures\n```\nThis is a hazard/survival framing: each provider is judged only on the trails where\nit was actually assigned, which automatically handles **right-censoring** (a\nprovider downstream of an earlier failure simply has no assignment from that trail,\nso it is neither credited nor blamed).\n\n### 7.3 Two signals\n\n- **Liveness / step-completion rate** `r_Y = c_Y / a_Y`. Report with a **Wilson\n  score** confidence interval, not a point estimate. Flag `Y` whose interval lies\n  below the global rate. This captures *dead / unreachable* providers.\n- **Latency distribution** (primary graded signal). For each *confirmed* step into\n  `Y`, `latency = confirmed_at \u2212 assigned_at`. Report per-provider median / p95 /\n  p99. Because the completion incentive (\u00a77.1) converts marginal providers'\n  near-failures into *slow successes*, the quality signal lives in the latency\n  **tail** \u2014 read p95/p99, and treat `r_Y` as a separate liveness flag.\n\n### 7.4 Exposure, baseline, and known-not-equal weighting\n\n- **Minimum exposure:** do not report `Y` until `a_Y \u2265 a_min`. Sparse providers\n  have meaningless ratios.\n- **Baseline:** under the null \"all providers equal,\" `r_Y` and the latency\n  distribution are equal across providers up to sampling noise. Test outliers with\n  non-overlapping Wilson intervals (liveness) or a peer-percentile threshold on p95\n  (latency).\n- **Uniform is not required \u2014 *known* is.** Eligibility (\u00a75.3) can make the draw\n  non-uniform. Because the candidate-set size `n` is recorded at each assignment,\n  the assignment probability `1/n` is known, so estimates can be inverse-probability\n  (Horvitz\u2013Thompson) weighted if needed. Equal probability only equalizes *power*\n  across providers, not correctness.\n\n### 7.5 Record latency **per step**, not per trail\n\nWrite the latency/confirmation sample at the instant a hop confirms (\u00a74.2 step 6),\n**not** at trail finalization. Otherwise a verifier that abandons a slow trail to\nstart a fresh one (rational under per-completion rewards, \u00a77.1) removes the slow\nprovider's measurement entirely \u2014 **survivorship bias** that makes slow providers\nlook fast. Per-step recording captures the slow hop that *triggered* the\nabandonment.\n\n> Tension to accept: per-step recording lets a self-dealer (verifier = provider `Y`)\n> bank a flattering measurement for `Y` without completing the trail. Mitigate by\n> weighting samples by verifier reputation and by \u00a77.7's anomaly detection \u2014 do not\n> rely on per-step recording alone where verifiers are untrusted.\n\n### 7.6 Exclude the seed hop\n\nOnly the `M\u22121` **server-assigned** positions are unbiased random samples. The seed\nhop (\u00a74.1) is verifier-*chosen* (they pick a working entry), so it is\nselection-biased upward. Never count the seed position in `a_Y` / `c_Y` / latency.\n\n### 7.7 Known biases the numbers still carry\n\n- **Incomplete = silence.** A failure can be the provider *or* a verifier that\n  crashed, was rate-limited, or rationally quit. Rewarding completion (\u00a77.1) makes\n  engaged verifiers try hard, which purifies this signal, but cannot remove\n  abandonment entirely.\n- **Adversarial abandonment.** A competitor can inflate victim `Y`'s `f_Y` by\n  abandoning specifically when assigned `Y`. This needs no `client_id`s and is not\n  caught by \u00a75.4. It is bounded only by verifier independence / reputation.\n- **Per-hop self-dealing.** `Y`'s operator can run a verifier and self-originate\n  `Y`'s step (needs only `Y`). Detect statistically: with enough *independent*\n  verifier volume, self-dealt samples appear as a too-perfect / bimodal cluster, or\n  as good numbers that only ever come from one verifier identity. This detection\n  exists **only to the degree the verifier population is independent** (\u00a71\n  assumption 2).\n- **Correlated outages.** Providers in one ASN/region fail together; model time and\n  region as covariates before declaring a provider individually bad.\n\nFor anything beyond ranking (e.g. payouts), fit a per-hop logistic/hazard model\nwith covariates {assigned provider, position-in-trail, verifier (random effect),\ntime/region} rather than reading marginal ratios.\n\n---\n\n## 8. Source-IP \u2192 provider mapping\n\n### 8.1 The mapping (partly new work)\n\nThe hop `client_id` comes from the request **source IP**, which is the egress IP of\nthe provider the verifier routed through. Extract the source IP exactly as\n`session/client_session.go:41` does \u2014 headers in order **`X-UR-Forwarded-For`**, then\n**`X-Forwarded-For`** (+`X-Forwarded-Source-Port`), then `r.RemoteAddr`.\n\nThe egress IPs exist in `proxy_client.client_ipv4` / `proxy_client_ipv4`\n(`db_migrations.go`), but there is **no reverse index** `egress_ipv4 \u2192 client_id`\ntoday \u2014 **this is new work**:\n\n- Maintain a Redis hash `verify_egress:<ipv4>` \u2192 `client_id`, written when a\n  `proxy_client` egress is allocated/released\n  (`network_client_proxy_model.go:583`). Look up by encoding the source IPv4 as the\n  same `bigint` used in `proxy_client`.\n- Or store **salted hashes** of egress IPs (`HMAC(server_salt, ipv4)`), matching\n  the original \"known ip hashes from providers\" so the table does not hold raw\n  provider IPs at rest. Look up by hashing the source IP.\n\nOnly providers satisfying the one-provider-\u21c4-one-egress-IP invariant (\u00a78.2) are\npresent in this index; everyone else is absent and therefore ineligible. Do the\nlookup in **constant-ish time** regardless of hit/miss (\u00a79).\n\n### 8.2 Eligibility invariant: one provider \u21c4 one egress IP\n\nThe hop lookup must be unambiguous, so eligibility enforces a **bijection** between\neligible providers and egress IPs. We do not attempt to disambiguate shared egress \u2014\nwe exclude.\n\n- **Exclude any `client_id` that currently has more than one egress IP.** A\n  multi-egress provider is simply not eligible to be sampled (\u00a75.1) until it is back\n  to a single egress IP. (CGNAT-style ambiguity is explicitly a non-goal.)\n- **The reverse index must be unique.** If an egress IP is ever observed backing\n  more than one `client_id`, that IP resolves to *no* provider \u2014 drop it, never guess.\n- Maintain the invariant where `proxy_client` egresses are allocated/released\n  (`network_client_proxy_model.go:583`): on a provider gaining a second egress IP,\n  remove it from the eligible index; on returning to a single egress IP, re-add it.\n- **IPv6 / churn:** index both families; expire entries when a `proxy_client` is\n  released so a reassigned IP is not miscredited to the previous holder.\n\n---\n\n## 9. Anti-deanonymization (poisoning) & DoS\n\n`/verify` must not become an oracle that tells anyone \"is IP X a provider, and which\n`client_id`?\"\n\n- **Poison unknown seeds.** If a SEED's source IP does not resolve to a provider,\n  still create a normal-looking trail with valid ASSIGNs and carry it **all the way\n  to depth `M`**, then silently decline to publish (mark `poison`, never write\n  `verify_trail`). The caller cannot distinguish a real trail from a poisoned one\n  until proofs publish.\n- **Indistinguishable responses & timing.** Real-vs-poison must match in payload and\n  latency. Resolve the IP mapping (\u00a78.1) in constant-ish time; issue ASSIGNs for\n  poison trails identically.\n- **This is delay+cost, not a wall.** A routing-capable attacker who completes a\n  trail still learns the truth via their own `vpk` when proofs publish; poisoning\n  only raises the cost to \"complete a full trail.\" It also does **not** address the\n  separate leak that *published* proofs reveal `client_id` sequences and timing \u2014\n  that is inherent to publishing the canonical provider.\n- **DoS bound.** Carrying poison trails to depth `M` costs server state, so rate-\n  limit SEEDs per source IP and per `vpk` (Redis `INCR`+`EXPIRE`,\n  `transport_rate_limit.go:124`), and optionally require a small proof-of-work on\n  SEED. Cap concurrent active trails per `vpk`.\n\n---\n\n## 10. Roadmap to payout-grade (deferred from v1)\n\nBecause this is an **open competition** (\u00a71), the following structural defenses are\nwhat v1 does not yet include. They are required before per-provider stats drive\nhigh-value payouts or public rankings; until then, treat v1 output as\nliveness/latency monitoring and provisional scoring.\n\n- **Proof-of-routing (provider co-attestation).** Have each hop cryptographically\n  attest it forwarded the verifier's packet, chained through neighbors, to raise the\n  bar on per-hop self-dealing (\u00a77.7). Note: a hop signing its *own* attestation is\n  forgeable by its operator; the value comes from *neighbor* attestation, which\n  again leans on `client_id` independence.\n- **Destination diversity.** Have the verifier fetch an unpredictable, server-chosen\n  *external* resource through each hop instead of only hitting `/verify`, so a\n  provider cannot pre-optimize the single measured path (\"teaching to the test\",\n  \u00a71). This is the only thing that converts the measurement from\n  *reachability-to-us* into *routing-quality*.\n- **Verifier Sybil resistance.** If verifiers are open and points have value, bind\n  verifier identity to stake / a permissioned set; otherwise per-hop self-dealing\n  and adversarial abandonment (\u00a77.7) are cheap.\n- **Hierarchical stats model.** The logistic/hazard model of \u00a77.7 for payout-grade\n  attribution.\n\n---\n\n## Appendix A \u2014 Canonical signed-message encoding\n\nAll signatures are over these exact byte strings (not JSON). All integers\nbig-endian. Fixed widths: `Id`/`client_id` = 16 B, Ed25519 pubkey = 32 B, signature\n= 64 B, `server_nonce` = 32 B, `time_ms` = `uint64`. The global context\n`CTX = \"urnetwork/verify/v1\"` is the 19 ASCII bytes, written verbatim. Variable hop\nlists are prefixed by a 1-byte count (`= depth`, \u2264 `MMax`).\n\n### A.1 SEED (`msg_type = 0x01`, signed by `vsk`)\n```\nCTX(19) \u2016 0x01 \u2016 vpk(32) \u2016 client_nonce(32) \u2016 M(1)\n```\n`seed_sig = ed25519.Sign(vsk, that)`. Server verifies with `vpk`.\n\n### A.2 EXTEND (`msg_type = 0x02`, signed by `vsk`, at depth `k`)\n```\nCTX(19) \u2016 0x02 \u2016 trail_id(16) \u2016 server_nonce(32) \u2016 vpk(32) \u2016 M(1)\n        \u2016 k(1) \u2016 client_id_1(16) \u2016 \u2026 \u2016 client_id_k(16)\n```\nwhere `client_id_1..k` are the confirmed hops `1..k\u22121` **plus** the pending hop the\nverifier is claiming at position `k`. **No times.** `extend_sig = ed25519.Sign(vsk,\u2026)`.\nThe depth-`M` EXTEND is the `verifier_sig` in the published proof (\u00a73.3).\n\n### A.3 ASSIGN (`msg_type = 0x03`, signed by `server_sk`)\n```\nCTX(19) \u2016 0x03 \u2016 server_key_id(1) \u2016 trail_id(16) \u2016 server_nonce(32) \u2016 vpk(32)\n        \u2016 M(1) \u2016 depth(1) \u2016 client_id_1(16) \u2016 \u2026 \u2016 client_id_depth(16)\n```\nwhere the last `client_id` is the newly assigned (pending) next hop. Returned with\neach non-final response so the verifier (and later auditors) hold the server's\ncommitment to the path.\n\n### A.4 FINAL (`msg_type = 0x04`, signed by `server_sk`, at depth `M`)\n```\nCTX(19) \u2016 0x04 \u2016 server_key_id(1) \u2016 trail_id(16) \u2016 server_nonce(32) \u2016 vpk(32)\n        \u2016 M(1) \u2016 (client_id_1(16) \u2016 time_ms_1(8)) \u2016 \u2026 \u2016 (client_id_M(16) \u2016 time_ms_M(8))\n```\n**Includes** server-stamped times. `final_sig = ed25519.Sign(server_sk, that)`;\nverified with the published server public key for `server_key_id`.\n\n---\n\n## Appendix B \u2014 Implementation checklist\n\n**Reuse (exists today):**\n- `server.Id`, `server.NewId()`, `server.ParseId()` \u2014 ids (`id.go`).\n- `server.NowUtc()` \u2014 server-authoritative time (`util.go:53`).\n- `model.GetClientPublicKey(ctx, clientId)` \u2014 verifier Ed25519 key (`network_client_key_model.go:24`).\n- `model.GetProvideModes(ctx, clientId)` \u2014 provider eligibility (`network_client_model.go:920`).\n- `server.Db` / `server.Tx` / `server.Redis` \u2014 storage (`db.go`, `redis.go`).\n- `router.NewRoute(\"POST\", \"/verify\", handlers.Verify)` + `handler(w, r)` (`api/api.go`, `auth_handlers.go:22`).\n- Source-IP extraction order from `session/client_session.go:41`.\n- Redis `INCR`+`EXPIRE` rate-limit pattern (`connect/transport_rate_limit.go:124`); `{\u2026}` hash-tag rule.\n\n**New work:**\n- `egress_ipv4 \u2192 client_id` reverse index (\u00a78.1), kept in sync with `proxy_client`.\n- Server Ed25519 verify keypair + `server_key_id` rotation + published public keys (\u00a73.5).\n- Trail state in Redis under `{vtr_<trail_id>}` (\u00a76.1); per-provider stats under `{vstat_<clientId>}`.\n- Eligibility token buckets `{velig_<clientId>}` (\u00a75.3).\n- `verify_trail` Postgres table + proof persistence (\u00a76.2).\n- `/verify` handler implementing SEED / EXTEND / finalize, poisoning, idempotency,\n  and the four signatures (Appendix A).\n- Reaper that sweeps expired `active` trails into failure stats (\u00a74.4, \u00a76.1).\n- Stats job: Wilson intervals, latency percentiles, per-transition attribution,\n  `a_min` gating (\u00a77).\n", "viz": [{"match": "1. What this proves", "cap": "What a completed trail proves \u2014 and what it does not (\u00a71)", "svg": "<svg viewBox=\"0 0 720 200\" xmlns=\"http://www.w3.org/2000/svg\" style=\"font-family:var(--sans)\"><defs><marker id=\"ah\" markerWidth=\"9\" markerHeight=\"9\" refX=\"6.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7,3 L0,6 Z\" fill=\"#999\"/></marker><marker id=\"ahg\" markerWidth=\"9\" markerHeight=\"9\" refX=\"6.5\" refY =\"#333\" font-weight=\"400\" text-anchor=\"start\">\u2717  Routing quality (only reachability to /verify)</text><text x=\"386\" y=\"156\" font-size=\"9.5\" fill=\"#c0392b\" font-weight=\"700\" text-anchor=\"start\">defended statistically + \u00a710 roadmap</text></svg>"}, {"match": "2. Roles and identities", "cap": "Three identities the server keeps distinct (\u00a72)", "svg": "<svg viewBox=\"0 0 720 210\" xmlns=\"http://www.w3.org/2000/svg\" style=\"font-family:var(--sans)\"><defs><marker id=\"ah\" markerWidth=\"9\" markerHeight=\"9\" refX=\"6.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7,3 L0,6 Z\" fill=\"#999\"/></marker><marker id=\"ahg\" markerWidth=\"9\" markerHeight=\"9\" refX=\"6.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7,3 L0,6 Z\" fill=\"#1a7a3a\"/></marker><marker id=\"ahr\" markerWidth=\"9\" markerHeight=\"9\" refX=\"6.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7,3 L0,6 Z\" fill=\"#c0392b\"/></marker><marker id=\"ahb\" markerWidth=\"9\" markerHeight=\"9\" refX=\"6.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7,3 L0,6 Z\" fill=\"#2471a3\"/></marker><marker id=\"ahw\" markerWidth=\"9\" markerHeight=\"9\" refX=\"6.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7,3 L0,6 Z\" fill=\"#e67e22\"/></marker></defs><rect x=\"280\" y=\"30\" width=\"160\" height=\"50\" rx=\"5\" fill=\"#eaf2f8\" stroke=\"#2471a3\" stroke-width=\"1\" /><rect x=\"280\" y=\"30\" width=\"4.5\" height=\"50\" rx=\"2\" fill=\"#2471a3\"/><text x=\"360.0\" y=\"52.0\" font-size=\"12.5\" fill=\"#2471a3\" font-weight=\"700\" text-anchor=\"middle\">VERIFIER</text><text x=\"360.0\" y=\"67.0\" font-size=\"10.0\" fill=\"#777\" font-weight=\"400\" text-anchor=\"middle\">Ed25519 vpk \u2014 from body+sig</text><rect x=\"40\" y=\"140\" width=\"180\" height=\"50\" rx=\"5\" fill=\"#e8f5ee\" stroke=\"#1a7a3a\" stroke-width=\"1\" /><rect x=\"40\" y=\"140\" width=\"4.5\" height=\"50\" rx=\"2\" fill=\"#1a7a3a\"/><text x=\"130.0\" y=\"162.0\" font-size=\"12.5\" fill=\"#1a7a3a\" font-weight=\"700\ end=\"url(#ahg)\"/><rect x=\"260\" y=\"50\" width=\"180\" height=\"46\" rx=\"5\" fill=\"#e8f5ee\" stroke=\"#1a7a3a\" stroke-width=\"1\" /><text x=\"350.0\" y=\"70.0\" font-size=\"12.5\" fill=\"#1a7a3a\" font-weight=\"700\" text-anchor=\"middle\">verify_egress:&lt;ipv4&gt;</text><text x=\"350.0\" y=\"85.0\" font-size=\"10.0\" fill=\"#777\" font-weight=\"400\" text-anchor=\"middle\">Redis reverse index</text><line x1=\"440\" y1=\"73\" x2=\"510\" y2=\"73\" stroke=\"#1a7a3a\" stroke-width=\"1.5\" marker-end=\"url(#ahg)\"/><rect x=\"510\" y=\"50\" width=\"150\" height=\"46\" rx=\"5\" fill=\"#e8f5ee\" stroke=\"#1a7a3a\" stroke-width=\"1\" /><rect x=\"510\" y=\"50\" width=\"4.5\" height=\"46\" rx=\"2\" fill=\"#1a7a3a\"/><text x=\"585.0\" y=\"70.0\" font-size=\"12.5\" fill=\"#1a7a3a\" font-weight=\"700\" text-anchor=\"middle\">client_id (hop)</text><text x=\"585.0\" y=\"85.0\" font-size=\"10.0\" fill=\"#777\" font-weight=\"400\" text-anchor=\"middle\">the proof anchor</text><rect x=\"40\" y=\"108\" width=\"620\" height=\"28\" rx=\"4\" fill=\"#fff8f0\" stroke=\"#e67e22\" stroke-width=\"1\" /><text x=\"350\" y=\"126\" font-size=\"9.5\" fill=\"#e67e22\" font-weight=\"700\" text-anchor=\"middle\">Bijection enforced: a provider with &gt;1 egress IP, or an IP backing &gt;1 provider, is dropped \u2014 never guessed</text></svg>"}, {"match": "9. Anti", "cap": "Anti-deanonymization \u2014 unknown seeds are poisoned, not rejected (\u00a79)", "svg": "<svg viewBox=\"0 0 720 160\" xmlns=\"http://www.w3.org/2000/svg\" style=\"font-family:var(--sans)\"><defs><marker id=\"ah\" markerWidth=\"9\" markerHeight=\"9\" refX=\"6.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7,3 L0,6 Z\" fill=\"#999\"/></marker><marker id=\"ahg\" markerWidth=\"9\" markerHeight=\"9\" refX=\"6.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7,3 L0,6 Z\" fill=\"#1a7a3a\"/></marker><marker id=\"ahr\" markerWidth=\"9\" markerHeight=\"9\" refX=\"6.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7,3 L0,6 Z\" fill=\"#c0392

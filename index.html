ividends. Keeps validators as **independent\n  on\u2011chain UIDs running real Yuma consensus** (median/clip/vtrust intact) and needs **no emission\n  capture** \u2014 the simplest, most Yuma\u2011native option. Risk: the bounty is only as large as the fee pool,\n  so the effort incentive is bounded (\u00a712.3).\n- **(Y) \u2014 the escalation.** Route the **41% validator emission itself** through the effort split \u2014 the\n  contract captures it and pays \u221d trails. Strongest effort incentive, but capturing requires\n  contract\u2011owned validator UIDs, which moves the quality consensus **into the contract** (robust median\n  of submitted crypto\u2011verified scores) instead of on\u2011chain Yuma. We move to (Y) only if (X)'s observed\n  trail coverage is too thin.\n\n*Eliminated with this decision:* the per\u2011NO validator pool, the NO\u2194V **intersection split**, **VT**, the\nverifier **bond**, `attestedPathsRoot`, and the **take\u20110 custody hack** \u2014 replaced by one rule, *more\nverified useful trails \u2192 more pay*. The intersection split was in any case redundant for fraud detection\n(a valid path is co\u2011signed = agreed by construction; an invalid one is caught by the `0x402` check, \u00a711.3)\nand was a weak effort proxy; the bounty is a direct, stronger one.\n\n---\n\n## 14. Multi\u2011pool structure (Pool 0 / Pool 1)\n\n`README.md` describes **Mining Pool 0 / Validator Pool 0** (\"the core network\") and **Mining Pool 1 /\nValidator Pool 1** (\"the VPN factory\", vpn.dev). Bittensor's **sub\u2011mechanism** feature (a subnet may\nrun multiple mechanisms, each with its own weight matrix and bond pool, with an owner\u2011set\n`mechanism_emission_split`) maps onto this directly:\n\n- **Pool 0 = mechanism 0 (core network).** Fully specified by this document.\n- **Pool 1 = mechanism 1 (VPN factory).** Same contract, same \u03b1, same role types; its own miner\u2011pool\n  UIDs and deposit/payout accounting, with validators scoring per\u2011mechanism (`set_mechanism_weights`).\n  The owner sets the \u03b1 split between pools.\n\nThe ST contract namespaces all per\u2011epoch state by `(poolId, epoch, \u2026)`; everything in \u00a7\u00a75\u201312 applies\nper pool. v1 launches Pool 0; Pool 1 is added by registering the second mechanism and enabling its\naccounting \u2014 no new mechanism design required.\n\n---\n\n## 15. Concrete parameters\n\n### 15.1 Subnet hyperparameters (owner\u2011set at creation; verify live before launch)\n\n| Hyperparameter | Value | Rationale |\n|---|---|---|\n| `tempo` | **360** | native ~72\u2011min weight/emission cadence (\u00a75.1) |\n| `max_allowed_uids` | **256** (raise via governance as NOs grow) | **1 miner\u2011pool UID per NO** + the validator UIDs; providers are NOT UIDs (\u00a73) |\n| `max_allowed_validators` | **64** (raise as the validator set grows) | the **independent validator** permits; root\u2011only to change (\u00a79.7) |\n| `commit_reveal_weights_enabled` | **true** | weights carry the subjective quality signal \u2014 anti\u2011copying (\u00a710) |\n| `liquid_alpha_enabled` | **true** | reward validators who back good pools early (\u00a710) |\n| `immunity_period` | **\u2265 5000 blocks**, and **> reveal interval** | protect new NO pools; must exceed `commit_reveal_period \u00d7 tempo` |\n| `min_allowed_weights` | **1** | a validator scores all NO pools; avoid the 1024 default |\n| `weights_version_key` | bump on scoring\u2011logic upgrades | force validator\u2011software upgrades (\u00a710) |\n| `serving_rate_limit` | default 50 | axons optional (custom HTTP protocol, \u00a716) |\n| `registration` | burn\u2011based, `min_burn`/`max_burn` tuned | Sybil cost on miner\u2011pool UIDs + validators |\n| `bonds_penalty` / `alpha_low`/`alpha_high` | tune (Liquid Alpha) | shape early\u2011discovery reward vs. stability (\u00a72.2) |\n\n> Several genesis defaults are governance\u2011mutable and have drifted from docs (e.g. `tao_weight = 0.18`\n> live; `max_validators` 64 vs 128; `commit_reveal` default flipped). Query the live chain and set\n> explicitly; do not rely on documented defaults (\u00a716 checklist).\n\n### 15.2 Contract / economic parameters\n\n| Parameter | Symbol | Suggested | Notes |\n|---|---|---|---|\n| Epoch length | `T_epoch` | 50 400 blocks (7 d) | settlement period |\n| Operator data deadline | \u2014 | +4 h | `README.md` |\n| Validator effort\u2011claim deadline | \u2014 | +24 h | `submitTrails` (\u00a76.2) |\n| Dispute window | \u2014 | +24 h\u2026+48 h | \u00a711.3 |\n| Non\u2011refundable deposit fraction | `\u03c6` | governance (e.g. 0.1\u20130.5) | self\u2011dealing floor **+ funds the effort bounty** (\u00a79.3, \u00a712.1) |\n| Owner\u2011cut slice to bounty | `\u03c9` | governance (e.g. 0\u20130.5) | owner co\u2011funds the failure\u2011data bounty (\u00a79.3, \u00a79.6) |\n| Coverage weighting | \u2014 | governance curve | up\u2011weights under\u2011sampled / weak providers (\u00a79.3) |\n| Validator min stake | \u2014 | governance | permit qualifier + Sybil ante (\u00a79.7) |\n| Global fixed rate (USD/GB, USD/user) | \u2014 | governance, **off\u2011chain reference** | NOs price customers + size deposits; not consumed on\u2011chain (\u00a77.1) |\n| Upgrade / param timelock | \u2014 | \u2265 1 epoch (target 2 \u2248 14 d) | Phase 1, \u00a76.4.2 |\n| Owner / timelock multisig | \u2014 | M\u2011of\u2011N | \u00a76.4 |\n| Guardian (pause\u2011only) | \u2014 | small multisig | \u00a76.4.2 |\n\n### 15.3 Emission (inherited from the chain)\n\n\u03b1 emission \u2248 1 \u03b1/block participant reward (subnet\u2011uniform), split **18% owner / 41% miners / 41%\nvalidators**, 21M \u03b1 cap with halvings. The contract does **not** set these (the owner cut is\ngovernance\u2011settable, the 41/41 is hard\u2011coded); it steers the *distribution within* the miner pools and\npays validators the \u00a79.3 effort bounty \u2014 validator **dividends flow natively**.\n\n---\n\n## 16. Implementation plan\n\n### 16.1 Components\n\n1. **ST contract (Solidity, Cancun / 0.8.24).** State + interfaces of \u00a76; precompile bindings\n   (Staking V2 `0x805`, Neuron `0x804`, Metagraph `0x802`, Alpha `0x808`, Ed25519 `0x402`); Merkle\n   verifier (OZ); the **`submitTrails` effort verifier**; proxy + owner multisig governance. **New work.**\n2. **Subnet bootstrap.** `register_network`; set hyperparameters (\u00a715.1); as each NO onboards, the\n   contract `burnedRegister`s its **miner\u2011pool UID** (owned outright); stand up an initial set of\n   **independent validators** (owner\u2011run at first) so consensus has measurement from day one; register\n   mechanism 1 for Pool 1 later.\n3. **Validator software (independent).** Stake \u03b1; run `VERIFIER.md` trails; each tempo score every NO\n   pool `deposit \u00d7 quality` and submit commit\u2011reveal weights (standard Bittensor validator loop \u2192 native\n   dividends); submit completed\u2011trail proofs to `submitTrails` for the effort bounty \u2014 **no central\n   keeper sets weights**. A separate **permissionless settlement poke** triggers `finalizeEpoch` after\n   the +48h window.\n4. **Network\u2011Operator software.** Runs the privacy servers + the `VERIFIER.md` `/verify` server\n   (SEED/EXTEND/FINAL, poisoning, idempotency, the four Ed25519 signatures, the egress\u2011IP index);\n   `deposit`s DT each epoch; computes provider reliability + payout list; commits the **`payoutRoot`**\n   (fractional shares); serves leaves. (No validator pool \u2014 it co\u2011signs trails as the `/verify` server.)\n5. **Provider software.** Carries ingress/egress; registers a `client_id`; verifies its payout leaf\n   against `payoutRoot`; `claimMiner`s.\n6. **Validator client (was \"verifier\").** `registerValidator(vpk)`; stake \u03b1; run `/verify` trails;\n   submit commit\u2011reveal pool scores (native dividends) **and** completed\u2011trail proofs to `submitTrails`\n   (effort bounty); `claimValidator`s the bounty; participates in disputes.\n7. **Indexer/explorer.** Surfaces `D_n`, pool quality `Q_n`, consensus weights, vtrust, the\n   **independent\u2011validator stake share**, the fee pool + per\u2011validator effort, and roots \u2014 the public\n   audit surface.\n\n### 16.2 The chain is identity + stake + weights only\n\nPer current Bittensor practice, **`serve_axon` is optional**: the runtime stores but never interprets\nthe axon protocol, and Yuma consumes only weights + stake. The UR network's transport is the custom\n`VERIFIER.md` HTTP protocol; participants discover each other out\u2011of\u2011band (the NO directory in\n`README.md`) or via the commitments pallet, and touch the chain only for **registration, the contract,\nweights, and emission**. This is a supported, common pattern (model\u2011commit subnets, orchestrator\nsubnets) \u2014 no Synapse/dendrite required.\n\n### 16.3 Milestones\n\n1. **M0 \u2014 Testnet subnet + contract skeleton.** Register on testnet (chain 945); deploy the contract;\n   register a **miner\u2011pool UID** and custody/move \u03b1 (`0x805`); prove an **independent validator** sets\n   commit\u2011reveal weights (`0x804`) and earns dividends; prove `submitTrails` verifies a trail via `0x402`.\n2. **M1 \u2014 Deposit + multi\u2011validator emission.** `deposit`; **\u2265 2 validators** score pools\n   `deposit \u00d7 quality`; verify miner emission **accrues to the contract** via the contract\u2011owned\n   miner\u2011pool UIDs and that consensus/clipping/vtrust behave; **per\u2011NO** `claimMiner` against\n   `payoutRoot` \u00d7 `poolTotal` end\u2011to\u2011end (providers claim directly) with a mock payout list.\n3. **M2 \u2014 Validator rail + effort bounty.** Integrate `VERIFIER.md` proofs; `registerValidator`;\n   `submitTrails` \u2192 coverage\u2011weighted `effort`; `feePool` = `\u03c6\u00b7\u03a3D + \u03c9\u00b7OwnerCut`; `claimValidator` pays\n   `feePool\u00b7effort/\u03a3effort` **on\u2011chain (no root)**; on\u2011chain Ed25519 verification via `0x402`.\n4. **M3 \u2014 7\u2011day settlement.** Full epoch lifecycle with the +4h/+24h/+48h\n   windows; settlement\u2011poke automation; the **append\u2011only finalized\u2011claims invariant** (\u00a76.4).\n5. **M4 \u2014 Mainnet Pool 0 (Phase 0 governance, \u00a76.4.1).** Mainnet (chain 964) launch under the owner\n   multisig + upgradeable proxy, conservative parameters, **quality\u2011factor swing capped until the\n   independent\u2011validator stake share is healthy** and `VERIFIER.md` \u00a710 advances (\u00a712.3).\n6. **M5 \u2014 Harden custody (Phase 1, \u00a76.4.2):** timelock (\u2265 1 epoch) on upgrades/params + a pause\u2011only\n   guardian; then **Pool 1 (VPN factory)** via mechanism 1.\n7. **M6 \u2014 Decentralize further (deferred, \u00a76.4.3):** trustless oracle (\u00a713.5), permissionless bonded\n   admission, on\u2011chain governance; advance the `VERIFIER.md` \u00a710 roadmap.\n\n### 16.4 Pre\u2011launch verification checklist (load\u2011bearing live values)\n\n- Precompile addresses/ABIs at the pinned Subtensor release (Staking **V2** `0x805`; Neuron `0x804`\n  `setWeights`; Ed25519 `0x402`; Alpha `0x808`).\n- `tao_weight` (expect 0.18), `max_allowed_validators`, `min_allowed_weights`,\n  `commit_reveal_weights_enabled` default, `SubnetOwnerCut` \u2014 query live, set explicitly.\n- Subnet creation cost (`btcli subnet burn-cost`) and registration burn bounds.\n- Confirm `transferStake`/`moveStake` within\u2011netuid are slippage\u2011free on the live runtime; confirm the\n  staking precompile's \"contract address = coldkey\" custody semantics.\n- Confirm an **independent validator** earns a permit at expected stake and that its **native\n  dividends** accrue to its own hotkey (no contract capture under (X)); confirm `submitTrails` \u2192 `0x402`\n  verification credits coverage\u2011weighted effort correctly.\n\n---\n\n## 17. Open questions from `INCENTIVES.md` \u2014 resolved\n\n| Question | Resolution |\n|---|---|\n| **How is oracle data stored/charged on Subtensor? Can the NO payout table be a Merkle tree so each miner validates its payout without storing it on chain?** | **Yes.** Commit a 32\u2011byte Merkle root per NO per epoch; the contract stores roots that gate claims and the **free** commitments pallet can mirror them; bulk leaves are served off\u2011chain; each provider verifies its own payout with an `O(log N)` proof (\u00a711). (No on\u2011chain oracle: the global rate is an off\u2011chain reference, \u00a77.1.) |\n| **Are smart contracts standard EVM?** | **Yes** \u2014 Frontier EVM, Cancun, Solidity 0.8.24, chain 964, permissionless deploy. With Subtensor\u2011specific **precompiles**, validators set commit\u2011reveal weights and the contract stakes/transfers \u03b1, reads the metagraph/\u03b1\u2011price, and verifies Ed25519 \u2014 everything this design needs (\u00a72.5). |\n| **How to adapt to standard BT payout formulas?** | Independent validators set standard Yuma weights `= deposit \u00d7 quality` on the per\u2011NO miner\u2011pool UIDs; the chain's incentive/dividend split delivers emission \u221d `deposit \u00d7 consensus\u2011quality` to the **miner pools** (which the contract owns \u2192 re\u2011splits to providers per Merkle payout roots, \u00a7\u00a78, 11) and \u221d stake \u00d7 vtrust to **validators natively**. Validator *effort* is paid by a fee\u2011funded bounty (\u00a79.3). No deviation from standard Yuma \u2014 it *is* Yuma, with many independent validators (\u00a79). |\n\n---\n\n## 18. Glossary\n\n- **NO (Network Operator)** \u2014 runs servers; operates **one miner\u2011pool UID** (contract\u2011owned) but holds no\n  emission; deposits DT; runs the `/verify` server (co\u2011signs trails); commits the payout root for its\n  providers. No validator.\n- **Miner\u2011pool UID** \u2014 the on\u2011chain miner: one per NO, contract\u2011owned. The 100k+ providers are **inside**\n  it (not UIDs) and are paid by Merkle claim.\n- **Provider / miner** \u2014 carries traffic; inside a NO's miner pool; **claims its \u03b1 directly from the\n  contract** per the NO payout root.\n- **Validator** (was \"verifier\") \u2014 an **independent** Bittensor validator UID: stakes \u03b1, runs\n  `VERIFIER.md` trails, scores pools, and earns **native dividends + a fee\u2011funded effort bounty** (\u00a79).\n  No NO, no pool \u2014 the disinterested consensus baseline.\n- **DT / \u03c6 / \u03c9** \u2014 deposit transaction (NO, \u221d usage); `\u03c6`\u00b7DT (non\u2011refundable) + `\u03c9`\u00b7OwnerCut fund the\n  validator **effort bounty** (\u00a79.3).\n- **Effort bounty** \u2014 fee\u2011funded reward paid \u221d verified, coverage\u2011weighted, server\u2011assigned completed\n  trails \u2014 the engine that keeps the failure data flowing (\u00a79.3).\n- **ST contract** \u2014 the subnet\u2011token (\u03b1) EVM contract: ledger + **custodian of miner emission** +\n  settlement + bounty payer. **Not** the validator (\u00a79\u2013\u00a710).\n- **`SUM(DT)` / `Q_n` / `\u0175_n`** \u2014 NO's epoch deposit total / its consensus\u2011measured pool quality / its\n  resulting consensus weight (\u221d `deposit \u00d7 quality`).\n- **Validated path** \u2014 a completed `VERIFIER.md` trail proof, id `keccak256(trail_id\u2016vpk\u2016server_key_id)`;\n  self\u2011proving (NO `FINAL` + validator `vpk` sigs), verified via `0x402`.\n- **Epoch (7 d)** \u2014 application settlement period; **tempo (360 blk)** \u2014 chain weight/emission cadence.\n\n---\n\n*End of WHITEPAPER.md v0.1. This document fixes the architecture and the formulas; the next artifacts\nare the contract source, the chain\u2011config script, and the operator/verifier reference daemons (\u00a716).*\n", "viz": [{"match": "Executive summary", "cap": "Protocol emission split \u2014 every block of subnet \u03b1 (\u00a72.2, \u00a715.3)", "svg": "<svg viewBox=\"0 0 720 150\" xmlns=\"http://www.w3.org/2000/svg\" style=\"font-family:var(--sans)\"><defs><marker id=\"ah\" markerWidth=\"9\" markerHeight=\"9\" refX=\"6.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7,3 L0,6 Z\" fill=\"#999\"/></marker><marker id=\"ahg\" markerWidth=\"9\" markerHeight=\"9\" refX=\"6.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7,3 L0,6 Z\" fill=\"#1a7a3a\"/></marker><marker id=\"ahr\" markerWidth=\"9\" markerHeight=\"9\" refX=\"6.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7,3 L0,6 Z\" fill=\"#c0392b\"/></marker><marker id=\"ahb\" markerWidth=\"9\" markerHeight=\"9\" refX=\"6.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7,3 L0,6 Z\" fill=\"#2471a3\"/></marker><marker id=\"ahw\" markerWidth=\"9\" markerHeight=\"9\" refX=\"6.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7,3 L0,6 Z\" fill=\"#e67e22\"/></marker></defs><text x=\"24\" y=\"30\" font-size=\"14.0\" fill=\"#111\" font-weight=\"700\" text-anchor=\"start\">Where each block of subnet \u03b1 goes</text><rect x=\"24\" y=\"52\" width=\"120.96\" height=\"40\" rx=\"0\" fill=\"#999\" stroke=\"#999\" stroke-width=\"1\" /><text x=\"84.47999999999999\" y=\"76.0\" font-size=\"11.0\" fill=\"#fff\" font-weight=\"700\" text-anchor=\"middle\">Owner 18%</text><rect x=\"144.95999999999998\" y=\"52\" width=\"275.52\" height=\"40\" rx=\"0\" fill=\"#1a7a3a\" stroke=\"#1a7a3a\" stroke-width=\"1\" /><text x=\"282.71999999999997\" y=\"76.0\" font-size=\"11.0\" fill=\"#fff\" font-weight=\"700\" text-anchor=\"middle\">Miners 41%</text><rect x=\"420.47999999999996\" y=\"52\" width=\"275.52\" height=\"40\" rx=\"0\" fill=\"#2471a3\" stroke=\"#2471a3\" stroke-width=\"1\" /><text x=\"558.24\" y=\"76.0\" font-size=\"11.0\" fill=\"#fff\" font-weight=\"700\" text-anchor=\"middle\">Validators 41%</text><rect x=\"24\" y=\"52\" width=\"672\" height=\"40\" rx=\"3\" fill=\"none\" stroke=\"#ddd\"/><text x=\"24\" y=\"118\" font-size=\"10.5\" fill=\"#999\" font-weight=\"700\" text-anchor=\"start\">Owner cut</text><text x=\"24\" y=\"134\" font-size=\"10.0\" fill=\"#777\" font-weight=\"400\" text-anchor=\"start\">governance treasury + \u03c9-slice funds the d \"575\" y=\"98\" font-size=\"9.5\" fill=\"#777\" font-weight=\"400\" text-anchor=\"middle\">custody</text><line x1=\"682\" y1=\"52\" x2=\"682\" y2=\"68\" stroke=\"#2471a3\" stroke-width=\"1.6\"/><text x=\"682\" y=\"44\" font-size=\"9.5\" fill=\"#2471a3\" font-weight=\"700\" text-anchor=\"middle\">M6</text><text x=\"682\" y=\"86\" font-size=\"9.5\" fill=\"#777\" font-weight=\"400\" text-anchor=\"middle\">decentralize</text><text x=\"682\" y=\"98\" font-size=\"9.5\" fill=\"#777\" font-weight=\"400\" text-anchor=\"middle\">further</text><rect x=\"40\" y=\"118\" width=\"640\" height=\"24\" rx=\"4\" fill=\"#f9fafb\" stroke=\"#ddd\" stroke-width=\"1\" /><text x=\"360\" y=\"134\" font-size=\"9.5\" fill=\"#555\" font-weight=\"700\" text-anchor=\"middle\">Phase 0 multisig+proxy  \u2192  Phase 1 timelock+guardian  \u2192  broader governance</text></svg>"}], "notes": [{"match": "Executive summary", "sub": "Marketplace subnets (Lium \u00b7 Chutes \u00b7 Targon)", "verdict": "support", "html": "The \u201creal-revenue marketplace subnet\u201d is now a proven, fundable archetype: <a href=\"https://bittensor.ai/subnets/51\" target=\"_blank\" rel=\"noopener\">Lium / Celium (SN51)</a> rents GPUs, <a href=\"https://www.coingecko.com/learn/top-bittensor-subnets-dtao\" target=\"_blank\" rel=\"noopener\">Chutes (SN64)</a> sells serverless inference, and <a href=\"https://iq.wiki/wiki/targon\" target=\"_blank\" rel=\"noopener\">Targon (SN4)</a>, a confidential-compute inference market, raised a $10.5M Series A. UR is squarely in this lineage \u2014 a two-sided market serving organic demand with \u03b1 as the medium. That validates the model; what differs is how UR <em>scales</em> it (operator pools + Merkle, \u00a73), not whether a marketplace subnet can work."}, {"match": "1. Summary of the mechanism", "sub": "Chutes / SN64 (Rayon Labs)", "verdict": "mixed", "html": "The shape here \u2014 one operator marshalling a large off-chain worker fleet, real (fiat) revenue, a rolling 7-day window, validators benchmarking off-chain then publishing weights on-chain \u2014 is the <a href=\"https://www.coingecko.com/learn/top-bittensor-subnets-dtao\" target=\"_blank\" rel=\"noopener\">Chutes (SN64)</a> pattern, today's largest inference subnet (<a href=\"https://messari.io/report/rayon-labs-the-subnet-trifecta\" target=\"_blank\" rel=\"noopener\">Rayon Labs</a>). UR's two real departures are sound: emission is custodied by a contract rather than the operator, and scoring is forced onto independent validators \u2014 squarely aimed at the centralisation that has dogged Chutes-style designs."}, {"match": "2. Background", "sub": "Live chain mechanics", "verdict": "support", "html": "The design tracks current chain state rather than stale docs \u2014 the <a href=\"https://docs.learnbittensor.org/learn/emissions\" target=\"_blank\" rel=\"noopener\">18/41/41 split, commit-reveal and dTAO</a> are all reflected, and the \u201cflow-based\u201d emission language matches the Nov-2025 Taoflow inflow model. No reliance on deprecated assumptions; the \u00a715 \u201cverify live before launch\u201d caution is the right posture."}, {"match": "3. Roles and on", "sub": "Pooling under one UID \u2014 precedent exists", "verdict": "mixed", "html": "Aggregating many off-chain workers under a single miner UID is <em>not</em> unprecedented: <a href=\"https://github.com/backend-developers-ltd/ComputeHorde\" target=\"_blank\" rel=\"noopener\">ComputeHorde</a> lets one miner register thousands of GPU \u201cexecutors\u201d under one UID, explicitly bypassing the ~256-slot cap, and <a href=\"https://docs.macrocosmos.ai/subnets/subnet-9-iota\" target=\"_blank\" rel=\"noopener\">IOTA (SN9)</a> replaced winner-take-all mining with a pooled, proportional-reward model. What stays genuinely novel in UR is the on-chain piece \u2014 a custody contract paying 100k+ off-chain providers by Merkle claim (nearest analog: <a href=\"https://github.com/bactensor/collateral-contracts\" target=\"_blank\" rel=\"noopener\">bactensor's collateral-contracts</a>, which only secures one miner's stake). So the aggregation is proven; the settlement layer is the unproven part."}, {"match": "8. Miner channel", "sub": "Competition moves off-chain", "verdict": "concern", "html": "A fair challenge: a subnet is meant to be a <em>perpetual competition</em> \u2014 every miner is a UID, Yuma ranks them each tempo, the weakest are deregistered. Here on-chain Yuma competes only the ~operators (few, capped), while the real contest among 100k providers happens off-chain, settled by the operator's payout list and policed by the <a href=\"https://bittensor.ai/subnets\" target=\"_blank\" rel=\"noopener\">VERIFIER</a> stats rather than the chain. Competition is preserved but <strong>relocated to the verifier layer</strong> \u2014 so it is only as robust as VERIFIER \u00a710, which is still deferred. ComputeHorde and IOTA make the same trade; the difference is they keep scoring on-chain-visible per executor/contributor."}, {"match": "6. The ST contract", "sub": "EVM custody precedent", "verdict": "mixed", "html": "The primitives are live: the <a href=\"https://docs.learnbittensor.org/evm-tutorials\" target=\"_blank\" rel=\"noopener\">Subtensor EVM</a>, the <a href=\"https://docs.learnbittensor.org/evm-tutorials/staking-precompile\" target=\"_blank\" rel=\"noopener\">staking precompile</a> and H160\u2194SS58 binding all exist and are documented. But using a contract as the custodian of miner emission is largely greenfield, and precompile ABIs are unversioned (the doc rightly says pin a release). Treat the M0/M1 testnet milestones as genuine risk-retirement, not a formality."}, {"match": "6. The ST contract", "sub": "Governance concentration", "verdict": "concern", "html": "The Phase-0 owner-multisig + upgradeable proxy + owner-as-referee is exactly the concentration pattern behind 2026's centralisation backlash \u2014 <a href=\"https://cryptobriefing.com/covenant-ai-exit-bittensor-tao-falls/\" target=\"_blank\" rel=\"noopener\">Covenant AI's exit</a> and <a href=\"https://blockonomi.com/bittensor-tao-plunges-30-amid-centralization-allegations-against-co-founder/\" target=\"_blank\" rel=\"noopener\">allegations of a co-founder unilaterally halting a subnet's emissions</a>, against a backdrop where the top-10 validators hold most stake. The \u00a76.4 timelock + pause-only guardian is the correct answer, but it should ship at mainnet, not be deferred to \u201clater.\u201d"}, {"match": "10. Setting weights", "sub": "SubVortex / Chutes scoring", "verdict": "support", "html": "Rewarding measured quality under commit-reveal Yuma is established practice \u2014 <a href=\"https://bittensor123.com/subnets/sn7/\" target=\"_blank\" rel=\"noopener\">SubVortex (SN7)</a> scores infra on uptime/latency and Chutes on capacity/speed/availability. Layering an objective deposit anchor on top of the measured quality term is a conservative, defensible extension rather than a novel consensus change."}, {"match": "16. Implementation plan", "sub": "Roadmap sequencing", "verdict": "mixed", "html": "Testnet \u2192 multi-validator emission \u2192 settlement \u2192 mainnet \u2192 harden is a sensible order. The concern is that Sybil-resistant verification (VERIFIER \u00a710) sits *after* mainnet (M4), i.e. real \u03b1 flows during the \u201cprovisional scoring\u201d window that most invites self-dealing. Gate high-value payouts on \u00a710 landing, not on reaching M4."}], "expl": [{"match": "Executive summary", "tag": "Investor lens", "title": "The thesis in one line", "html": "For an allocator who already knows Bittensor: this is a <strong>real-revenue subnet</strong> (a privacy / VPN network) where operators must <strong>buy and lock the subnet's \u03b1</strong> to compete for emissions, funded by actual customer revenue. That makes on-chain deposits a structural bid on \u03b1 and a usage proxy you can underwrite \u2014 closer to a cash-flowing business than an emissions-farming subnet. The asterisk lives in VERIFIER: until \u00a710 ships, the quality signal behind emissions is provisional."}, {"match": "1. Summary of the mechanism", "tag": "Investor lens", "title": "Where \u03b1 value comes from", "html": "<ul><li><strong>Demand sink:</strong> every epoch operators deposit \u03b1 sized to real usage, and competing for emission bids those deposits up \u2192 recurring buy-and-lock pressure on \u03b1 that most subnets simply don't have.</li><li><strong>Pass-through, not round-trip:</strong> deposits never return to the operator \u2014 they fund that operator's providers (capacity) and the validators. \u03b1 circulates to workers who may hold, restake, or sell.</li><li><strong>Same emission plumbing:</strong> the 41 / 41 / 18 split is untouched; this design only decides <em>who</em> earns the miner share and <em>how</em> it is steered.</li></ul>"}, {"match": "3. Roles and on", "tag": "In plain English", "title": "Miners (the pool) vs validators \u2014 the mechanics", "html": "<table class='cmp'><thead><tr><th></th><th style='color:#1a7a3a'>Miners \u2014 the pool (operator + providers)</th><th style='color:#2471a3'>Validators</th></tr></thead><tbody><tr><td>On-chain identity</td><td>The operator (NO) = <strong>one contract-owned miner-pool UID</strong> that holds no emission; 100k+ providers live <em>inside</em> it as <code>client_id</code>s \u2014 not UIDs.</td><td>Each validator is its <strong>own independent UID + hotkey</strong>. No pool, no NO.</td></tr><tr><td>Who runs it &amp; does what</td><td>NO runs the VPN servers <em>and</em> the <code>/verify</code> server; providers carry the ingress/egress traffic and build usage + reliability.</td><td>Anyone staking \u03b1; runs server-assigned <code>/verify</code> trails to prove which providers are live and scores every pool.</td></tr><tr><td>Cost to take part</td><td>NO: a one-time UID registration burn <strong>+ a recurring \u03b1 deposit each epoch</strong> (\u03c6 of it non-refundable). Providers: nothing on-chain.</td><td><strong>Stake \u03b1</strong> \u2014 the Sybil ante; earns a permit if top-k by stake.</td></tr><tr><td>How emission is earned</td><td>Validators score the pool <code>\u0175 \u221d deposit \u00d7 quality</code> \u2192 Yuma median/clip \u2192 the <strong>41% miner emission accrues to the pool UID</strong>.</td><td><strong>Native dividends \u221d stake \u00d7 vtrust</strong> (41% validator share) + a fee-funded <strong>effort bounty \u221d verified trails</strong>.</td></tr><tr><td>Who holds the \u03b1</td><td>The contract custodies the pool: <code>poolTotal = emission + (1\u2212\u03c6)\u00b7deposit</code>. The NO never touches it.</td><td>Dividends flow <strong>natively to the validator's own hotkey</strong>; the bounty sits in the FeePool.</td></tr><tr><td>How they're paid out</td><td>NO commits a Merkle <code>payoutRoot</code>; each provider claims <code>share \u00d7 poolTotal</code> with an O(log N) proof \u2014 capped, one claim per NO.</td><td><code>claimValidator</code> pays <code>FeePool \u00d7 effort/\u03a3effort</code>, computed on-chain \u2014 no root. Dividends auto-accrue.</td></tr><tr><td>Cadence</td><td>7-day epoch; NO commits payout root \u2264 +4h; provider claims open after +48h.</td><td>Score every tempo (~72 min); submit trail effort \u2264 +24h; disputes +24\u201348h.</td></tr><tr><td>Anti-gaming</td><td>\u03c6 cost floor + must win quality consensus + per-pool payout cap; paying idle providers cuts Q \u2192 less emission.</td><td>commit-reveal (no copying), clip + vtrust (no inflating), self-weight mask (can't score own NO), sampled + disputable proofs (bad leaf forfeits stake).</td></tr></tbody></table><div style='font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:#999;font-weight:700;margin:14px 0 2px'>Within the pool \u2014 operator &rarr; Merkle root &rarr; providers claim directly</div><svg viewBox=\"0 0 960 300\" xmlns=\"http://www.w3.org/2000/svg\" style=\"font-family:var(--sans)\"><defs><marker id=\"ah\" markerWidth=\"9\" markerHeight=\"9\" refX=\"6.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7,3 L0,6 Z\" fill=\"#999\"/></marker><marker id=\"ahg\" markerWidth=\"9\" markerHeight=\"9\" refX=\"6.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7,3 L0,6 Z\" fill=\"#1a7a3a\"/></marker><marker id=\"ahr\" markerWidth=\"9\" markerHeight=\"9\" refX=\"6.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7,3 L0,6 Z\" fill=\"#c0392b\"/></marker><marker id=\"ahb\" markerWidth=\"9\" markerHeight=\"9\" refX=\"6.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7,3 L0,6 Z\" fill=\"#2471a3\"/></marker><marker id=\"ahw\" markerWidth=\"9\" markerHeight=\"9\" refX=\"6.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7,3 L0,6 Z\" fill=\"#e67e22\"/></marker></defs><rect x=\"24\" y=\"110\" width=\"185\" height=\"90\" rx=\"5\" fill=\"#f9fafb\" stroke=\"#ddd\" stroke-width=\"1\" /><rect x=\"24\" y=\"110\" width=\"4.5\" height=\"90\" rx=\"2\" fill=\"#e67e22\"/><text x=\"116.5\" y=\"152.0\" font-size=\"12.5\" fill=\"#111\" font-weight=\"700\" text-anchor=\"middle\">Network Operator</text><text x=\"116.5\" y=\"167.0\" font-size=\"10\" fill=\"#777\" font-weight=\"400\" text-anchor=\"middle\">deposits \u03b1 \u00b7 sets payout split</text><line x1=\"209\" y1=\"155\" x2=\"300\" y2=\"155\" stroke=\"#e67e22\" stroke-width=\"1.5\" marker-end=\"url(#ahw)\"/><text x=\"214\" y=\"147\" font-size=\"10.5\" fill=\"#777\" font-weight=\"400\" text-anchor=\"start\">deposit \u03b1 + commit root</text><rect x=\"300\" y=\"16\" width=\"280\" height=\"38\" rx=\"5\" fill=\"#fff8f0\" stroke=\"#e67e22\" stroke-width=\"1\" /><text x=\"440.0\" y=\"39.0\" font-size=\"12.5\" fill=\"#e67e22\" font-weight=\"700\" text-anchor=\"middle\">\u03c6\u00b7deposit \u2192 FeePool \u2192 validators</text><rect x=\"300\" y=\"66\" width=\"280\" height=\"34\" rx=\"5\" fill=\"#e8f5ee\" stroke=\"#1a7a3a\" stroke-width=\"1\" /><text x=\"440.0\" y=\"87.0\" font-size=\"12.5\" fill=\"#1a7a3a\" font-weight=\"700\" text-anchor=\"middle\">payoutRoot \u2014 Merkle, \u03a3 share = 1</text><rect x=\"300\" y=\"112\" width=\"280\" height=\"96\" rx=\"8\" fill=\"#f9fafb\" stroke=\"#111\" stroke-width=\"1.4\" /><text x=\"440\" y=\"140\" font-size=\"12\" fill=\"#111\" font-weight=\"700\" text-anchor=\"middle\">Miner-pool UID (contract-owned)</text><text x=\"440\" y=\"166\" font-size=\"11\" fill=\"#555\" font-weight=\"400\" text-anchor=\"middle\">poolTotal =</text><text x=\"440\" y=\"186\" font-size=\"12\" fill=\"#1a7a3a\" font-weight=\"700\" text-anchor=\"middle\">emission + (1\u2212\u03c6)\u00b7deposit</text><line x1=\"440\" y1=\"112\" x2=\"440\" y2=\"56\" stroke=\"#e67e22\" stroke-width=\"1.5\" marker-end=\"url(#ahw)\" stroke-dasharray=\"4 3\"/><text x=\"448\" y=\"92\" font-size=\"10\" fill=\"#e67e22\" font-weight=\"700\" text-anchor=\"start\">\u03c6 slice</text><rect x=\"700\" y=\"56\" width=\"210\" height=\"44\" rx=\"5\" fill=\"#f9fafb\" stroke=\"#ddd\" stroke-width=\"1\" /><rect x=\"700\" y=\"56\" width=\"4.5\" height=\"44\" rx=\"2\" fill=\"#1a7a3a\"/><text x=\"805.0\" y=\"82.0\" font-size=\"12.5\" fill=\"#111\" font-weight=\"700\" text-anchor=\"middle\">Provider \u00b7 claim 1</text><rect x=\"700\" y=\"114\" width=\"210\" height=\"44\" rx=\"5\" fill=\"#f9fafb\" stroke=\"#ddd\" stroke-width=\"1\" /><rect x=\"700\" y=\"114\" width=\"4.5\" height=\"44\" rx=\"2\" fill=\"#1a7a3a\"/><text x=\"805.0\" y=\"140.0\" font-size=\"12.5\" fill=\"#111\" font-weight=\"700\" text-anchor=\"middle\">Provider \u00b7 claim 2</text><rect x=\"700\" y=\"172\" width=\"210\" height=\"44\" rx=\"5\" fill=\"#f9fafb\" stroke=\"#ddd\" stroke-width=\"1\" /><rect x=\"700\" y=\"172\" width=\"4.5\" height=\"44\" rx=\"2\" fill=\"#1a7a3a\"/><text x=\"805.0\" y=\"198.0\" font-size=\"12.5\" fill=\"#111\" font-weight=\"700\" text-anchor=\"middle\">Provider \u00b7 claim 3</text><line x1=\"580\" y1=\"150\" x2=\"700\" y2=\"78\" stroke=\"#1a7a3a\" stroke-width=\"1.5\" marker-end=\"url(#ahg)\"/><line x1=\"580\" y1=\"160\" x2=\"700\" y2=\"136\" stroke=\"#1a7a3a\" stroke-width=\"1.5\" marker-end=\"url(#ahg)\"/><line x1=\"580\" y1=\"170\" x2=\"700\" y2=\"194\" stroke=\"#1a7a3a\" stroke-width=\"1.5\" marker-end=\"url(#ahg)\"/><text x=\"480\" y=\"252\" font-size=\"11\" fill=\"#111\" font-weight=\"700\" text-anchor=\"middle\">each claims  share \u00d7 poolTotal  with an O(log N) Merkle proof (capped \u2014 no over-drain)</text><text x=\"480\" y=\"274\" font-size=\"10.5\" fill=\"#777\" font-weight=\"400\" text-anchor=\"middle\">the operator directs the split; the contract pays each provider directly and never holds the money</text></svg>"}, {"match": "2. Background", "tag": "In plain English", "title": "No exotic chain risk", "html": "This subnet uses only standard, live Bittensor machinery \u2014 the 18/41/41 split, dTAO \u03b1/AMM pricing, commit-reveal, and the Nov-2025 Taoflow model where \u03b1 price tracks net TAO staked in. So the token behaves like any other subnet \u03b1 (a levered bet on TAO inflows), and there's no bespoke consensus to underwrite. The novel risk sits in the <em>contract</em> and the <em>verifier</em>, not the chain."}, {"match": "5. Time", "tag": "Investor lens", "title": "A weekly cash cycle", "html": "Emissions still mint every tempo (~72 min), but settlement runs on a 7-day block: providers and validators claim \u03b1 weekly, after a 48-hour challenge window. For a holder that means reward cash-flows arrive weekly \u2014 and the design hard-codes that <strong>finalized claims can't be clawed back</strong> by governance, a real protection for anyone earning here."}, {"match": "6. The ST contract", "tag": "In plain English", "title": "How payments work", "html": "<p>Everything runs in 7-day blocks. During each block the contract collects money from two places: operators' <strong>deposits</strong>, and the subnet's \u03b1 <strong>emission</strong> it earns for each pool (based on deposit \u00d7 quality).</p><ul><li>At block end, each operator's pool = the \u03b1 it earned + the refundable part of its deposit. (A slice of every deposit, \u03c6, is kept back to pay validators.)</li><li>The operator publishes a payout list \u2014 who gets what share. Each miner then <strong>claims its own \u03b1 directly from the contract</strong> with a cryptographic proof. The operator never holds or forwards a miner's money.</li><li>Validators are paid separately: normal Bittensor dividends arrive in their wallet automatically, and they claim an <strong>effort bounty</strong> from the contract for their verification work.</li><li>It's all in \u03b1 and fee-free to move; you only pay a market price if you later swap \u03b1 for TAO.</li></ul>"}, {"match": "6. The ST contract", "tag": "Investor lens", "title": "The biggest technical risk to capital", "html": "The contract custodies every deposit and all captured miner emission, so <strong>smart-contract risk is the single largest threat here</strong> \u2014 bigger than the tokenomics. Mitigants the doc commits to: audits, an append-only \u201cfinalized claims are sacrosanct\u201d rule, and a Phase-1 timelock + pause-only guardian. Diligence the audit, and whether that timelock actually ships at mainnet rather than \u201clater.\u201d"}, {"match": "7. Deposits", "tag": "Investor lens", "title": "The number to watch: \u03a3DT", "html": "Total deposits (SUM(DT)) is the cleanest on-chain proxy for the subnet's real revenue, because deposits are bounded by operators' actual customer income. Rising \u03a3DT = more usage and more \u03b1 locked; falling \u03a3DT = demand rolling over. Read it like an on-chain revenue print, and watch the non-refundable fraction \u03c6 \u2014 a permanent \u03b1 sink."}, {"match": "9. Validator channel", "tag": "Investor lens", "title": "Validator economics (staker upside)", "html": "On top of normal dividends, validators here earn a fee bounty funded by \u03c6\u00b7deposits + a slice of the owner cut \u2014 so validator income is tied to <em>real usage</em>, not just stake. That pays for the verification data the product depends on. If you delegate to a validator, the bounty is upside that scales with the subnet's actual demand."}, {"match": "10. Setting weights", "tag": "Investor lens", "title": "You can't just buy emissions", "html": "Emission share = deposit \u00d7 measured quality. A big deposit alone won't capture rewards if an operator's providers fail the independent validators' quality checks, and the self-weight mask stops anyone scoring their own pool. That raises the bar on mercenary capture \u2014 but only as far as the independent-validator set is genuinely independent, which is the open risk."}, {"match": "12. Economic analysis", "tag": "Investor lens", "title": "Why deposits \u2248 real revenue", "html": "The equilibrium is D \u2264 revenue: depositing more \u03b1 than your customers pay you is pure loss, because deposits flow to providers and validators and never back. So sustained deposits can't be faked indefinitely and \u03a3DT converges on genuine usage \u2014 the property that lets you underwrite this subnet on fundamentals rather than narrative."}, {"match": "14. Multi", "tag": "Investor lens", "title": "Two products, one token", "html": "Pool 0 (core network) and Pool 1 (VPN factory, vpn.dev) are two revenue lines sharing one \u03b1. More surface area for demand \u2014 but the chain caps a subnet at 2 mechanisms today and forces a UID trade-off, so this is optionality, not unlimited expansion, until that cap is raised."}, {"match": "8. Miner channel", "tag": "In plain English", "title": "Can operators be held accountable for where the money goes?", "html": "<p>Yes \u2014 mostly by design, not by trust:</p><ul><li><strong>They can't run off with it.</strong> The contract holds the \u03b1; the operator only publishes a list of shares. It never touches the miners' funds.</li><li><strong>The list is auditable.</strong> The share list and the public proof of which providers were actually online are both on record, so anyone can check whether an operator paid live workers or idle / fake ones.</li><li><strong>Cheating is self-punishing.</strong> Pay idle providers over good ones and your pool's measured quality drops in validator scoring \u2192 you earn less emission next block.</li><li><strong>Hard cap.</strong> The contract won't let an operator pay out more than its pool actually holds.</li><li><strong>The honest limit:</strong> the protocol doesn't force a specific split \u2014 the operator picks the shares. Blatant self-dealing is caught statistically and handled by governance (delisting, losing staked funds), not yet fully enforced in code. So today it's \u201cauditable and economically disciplined,\u201d not \u201c100% enforced by the contract.\u201d</li></ul>"}, {"match": "16. Implementation plan", "tag": "Investor lens", "title": "What de-risks the thesis, in order", "html": "Read the milestones as risk-retirement. M4 is mainnet, but payouts stay provisional until VERIFIER \u00a710 (Sybil-resistant, honest-relay verification) lands. The investable inflection is when \u03a3DT is growing <em>and</em> \u00a710 has shipped \u2014 before that, emission quality is best-effort. M5 (timelock + guardian) is the custody-risk milestone."}]}]</script>
<script>
marked.setOptions({gfm:true, breaks:false, headerIds:false, mangle:false});
var DOCS = JSON.parse(document.getElementById('docdata').textContent);
var docnav = document.getElementById('docnav'), main = document.getElementById('main');
var slug = function(s){return s.toLowerCase().replace(/[^\w]+/g,'-').replace(/^-+|-+$/g,'');};
DOCS.forEach(function(d, i){
  var link = document.createElement('div');
  link.className = 'doc-link' + (i===0?' active':''); link.id = 'lnk-'+d.id;
  link.innerHTML = '<div class="t">'+d.title+'</div><div class="s">'+d.sub+'</div>';
  link.onclick = function(){ show(d.id); };
  docnav.appendChild(link);
  var toc = document.createElement('div'); toc.className='toc'; toc.id='toc-'+d.id;
  toc.style.display = i===0?'block':'none'; docnav.appendChild(toc);
  var section = document.createElement('section');
  section.className = 'doc' + (i===0?' active':''); section.id = 'doc-'+d.id;
  section.innerHTML = '<div class="doc-head"><div class="kicker">UR Subnet</div><h1>'+d.title+'</h1><div class="lede">'+d.sub+'</div></div>';
  var body = document.createElement('div'); body.className='md';
  body.innerHTML = marked.parse(d.md);
  section.appendChild(body); main.appendChild(section);
  // inject figures after matching headings
  var heads = body.querySelectorAll('h1,h2');
  (d.viz||[]).forEach(function(v){
    for(var k=0;k<heads.length;k++){
      if(heads[k].__used) continue;
      if(heads[k].textContent.trim().indexOf(v.match)===0){
        heads[k].__used=true;
        heads[k].__cap=v.cap;                       // for caption-aware search
        var fig=document.createElement('figure'); fig.className='figure';
        fig.innerHTML=v.svg+(v.cap?'<figcaption>'+v.cap+'</figcaption>':'');
        var s=fig.querySelector('svg');             // accessibility (B2)
        if(s){ s.setAttribute('role','img'); s.setAttribute('aria-label',v.cap); }
        heads[k].parentNode.insertBefore(fig, heads[k].nextSibling);
        break;
      }
    }
  });
  // inject annotations after a heading, past any blocks already placed there
  var heads2 = body.querySelectorAll('h1,h2');
  function injectAfter(match, el){
    for(var k=0;k<heads2.length;k++){
      if(heads2[k].textContent.trim().indexOf(match)===0){
        var a=heads2[k];
        while(a.nextSibling && a.nextSibling.nodeType===1 && a.nextSibling.classList &&
              (a.nextSibling.classList.contains('figure')||a.nextSibling.classList.contains('callout')||a.nextSibling.classList.contains('explain')))
          a=a.nextSibling;
        a.parentNode.insertBefore(el, a.nextSibling);
        return true;
      }
    }
    return false;
  }
  (d.expl||[]).forEach(function(x){
    var ex=document.createElement('aside');
    ex.className='explain'+(x.tag==='Investor lens'?' inv':'');
    ex.innerHTML='<div class="ex-head"><span class="ex-tag">'+(x.tag||'In plain English')+'</span><span class="ex-title">'+x.title+'</span></div><div class="ex-body">'+x.html+'</div>';
    injectAfter(x.match, ex);
  });
  (d.notes||[]).forEach(function(n){
    var co=document.createElement('aside'); co.className='callout v-'+n.verdict;
    co.innerHTML='<div class="co-head"><span class="co-tag">Comparable</span><span class="co-sub">'+n.sub+'</span><span class="co-chip">'+n.verdict+'</span></div><div class="co-body">'+n.html+'</div>';
    injectAfter(n.match, co);
  });
  // TOC from h1/h2
  var tocItems=[];
  body.querySelectorAll('h1,h2').forEach(function(h){
    var id=d.id+'--'+slug(h.textContent); h.id=id;
    var a=document.createElement('a'); a.href='#'+id;
    a.textContent=h.textContent.replace(/\s+/g,' ').trim();
    a.dataset.extra=(h.__cap||'').toLowerCase();   // caption-aware search (B4)
    if(h.tagName==='H2') a.className='lvl3';
    a.onclick=function(e){e.preventDefault();location.hash=id;document.getElementById(id).scrollIntoView({behavior:'smooth',block:'start'});closeMobile();};
    toc.appendChild(a); tocItems.push({a:a,h:h});
  });
  d._toc=tocItems;
});
function show(id,keepHash){
  DOCS.forEach(function(d){
    var on=d.id===id;
    document.getElementById('doc-'+d.id).classList.toggle('active',on);
    document.getElementById('lnk-'+d.id).classList.toggle('active',on);
    document.getElementById('toc-'+d.id).style.display=on?'block':'none';
  });
  if(!keepHash) location.hash=id;
  window.scrollTo(0,0); closeMobile();
}
document.getElementById('search').addEventListener('input',function(e){
  var q=e.target.value.toLowerCase().trim();
  DOCS.forEach(function(d){d._toc.forEach(function(it){
    var hit=!q||it.a.textContent.toLowerCase().indexOf(q)>=0||(it.a.dataset.extra||'').indexOf(q)>=0;
    it.a.style.display=hit?'block':'none';});});
});
// deep-linking via URL hash (C3)
function applyHash(){
  var h=(location.hash||'').replace(/^#/,''); if(!h) return;
  var docId=h.split('--')[0];
  if(DOCS.some(function(d){return d.id===docId;})){
    show(docId,true);
    if(h.indexOf('--')>=0){ var el=document.getElementById(h);
      if(el) setTimeout(function(){el.scrollIntoView({block:'start'});},30); }
  }
}
window.addEventListener('hashchange',applyHash); applyHash();
// figures toggle (A5)
var figBtn=document.getElementById('figBtn');
figBtn.onclick=function(){
  var off=document.body.classList.toggle('nofigs');
  figBtn.classList.toggle('on',!off);
};
var noteBtn=document.getElementById('noteBtn');
noteBtn.onclick=function(){
  var off=document.body.classList.toggle('nonotes');
  noteBtn.classList.toggle('on',!off);
};
var explBtn=document.getElementById('explBtn');
explBtn.onclick=function(){
  var off=document.body.classList.toggle('noexpl');
  explBtn.classList.toggle('on',!off);
};
var spy=function(){
  var active=DOCS.filter(function(d){return document.getElementById('doc-'+d.id).classList.contains('active');})[0];
  if(!active)return; var top=window.scrollY+80,cur=null;
  active._toc.forEach(function(it){if(it.h.offsetTop<=top)cur=it;});
  active._toc.forEach(function(it){it.a.classList.toggle('active',it===cur);});
};
window.addEventListener('scroll',spy); spy();
var sb=document.getElementById('sidebar'),scrim=document.getElementById('scrim');
function closeMobile(){sb.classList.remove('open');scrim.classList.remove('show');}
document.getElementById('menuBtn').onclick=function(){sb.classList.toggle('open');scrim.classList.toggle('show');};
scrim.onclick=closeMobile;
</script>
</body>
</html>
